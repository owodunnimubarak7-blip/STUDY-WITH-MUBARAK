<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery Pro | STUDY-WITH-MUBARAK</title>
    <style>
        :root { 
            --success: #22c55e; 
            --danger: #ef4444; 
            --primary: #3b82f6; 
            --dark: #1e293b; 
            --gray: #64748b;
        }
        body { 
            background-color: #f1f5f9; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0;
            padding: 0;
        }
        header {
            background: var(--dark); 
            color: white; 
            padding: 40px 20px; 
            text-align: center;
        }
        header h1 { margin: 0 0 10px 0; font-size: 2rem; }
        header p { margin: 0 0 15px 0; color: #94a3b8; }
        .quiz-container { 
            max-width: 750px; 
            margin: 40px auto; 
            padding: 0 20px 60px 20px; 
        }
        .quiz-card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
        }
        .progress-bar { 
            width: 100%; 
            background: #e2e8f0; 
            height: 12px; 
            border-radius: 10px; 
            margin-bottom: 30px; 
            overflow: hidden; 
        }
        #progress-fill { 
            height: 100%; 
            background: var(--primary); 
            width: 0%; 
            transition: 0.4s ease; 
        }
        .instruction-tag {
            background: #f8fafc;
            color: #475569;
            font-size: 0.95rem;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
            line-height: 1.5;
            font-weight: 500;
        }
        .passage-box {
            background: #fff7ed;
            border: 1px solid #ffedd5;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            font-size: 1.05rem;
            line-height: 1.7;
            color: #431407;
            text-align: left;
        }
        .question-text { 
            font-size: 1.3rem; 
            color: var(--dark); 
            margin-bottom: 25px; 
            font-weight: 700; 
            line-height: 1.5;
        }
        .option-btn { 
            display: block; 
            width: 100%; 
            padding: 16px 20px; 
            margin: 12px 0; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            background: white; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            font-weight: 500;
            text-align: left;
            color: var(--dark);
        }
        .option-btn:hover:not([disabled]) { 
            border-color: var(--primary); 
            background: #f8fbff; 
        }
        .option-btn.selected {
            border-color: var(--primary);
            background: #eff6ff;
            box-shadow: 0 0 0 1px var(--primary);
        }
        
        /* Status Animations */
        .correct { 
            background: var(--success) !important; 
            color: white !important; 
            border-color: var(--success) !important; 
            animation: pulse 0.5s; 
        }
        .wrong { 
            background: var(--danger) !important; 
            color: white !important; 
            border-color: var(--danger) !important; 
            animation: shake 0.4s; 
        }
        
        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-6px); } 
            75% { transform: translateX(6px); } 
        }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.02); } 
            100% { transform: scale(1); } 
        }

        #explanation-bar { 
            display: none; 
            margin-top: 25px; 
            padding: 20px; 
            background: #f0fdf4; 
            border-left: 5px solid var(--success); 
            border-radius: 12px; 
            color: #166534; 
            font-weight: 500; 
            text-align: left;
            line-height: 1.6;
        }
        .hidden { display: none !important; }
        .score-text { font-size: 3rem; color: var(--primary); font-weight: 800; margin: 15px 0; }
        
        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            transition: background 0.2s;
        }
        .action-btn:hover {
            background: #2563eb;
        }
        .action-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }
    </style>
</head>

        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "Choose the ANTONYM of 'Enervate':", options: ["Weaken", "Exhaust", "Invigorate", "Debilitate"], correct: 2, exp: "Enervate means to drain energy. Invigorate means to give strength and energy." },
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "Choose the ANTONYM of 'Obsequious':", options: ["Submissive", "Domineering", "Servile", "Fawning"], correct: 1, exp: "Obsequious means overly obedient. Domineering means asserting one's will over others." },

        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "5. Unlike C, though the message was clearly written, D did not understand it because it was ______.", options: ["A. Good", "B. Unclear", "C. Vague", "D. Ambiguous"], correct: 1, exp: "The phrase 'clearly written' is directly contrasted with 'unclear'." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "6. Good policies are usually reasonable but bad ones are ______", options: ["A. unrealistic", "B. inadequate", "C. unattractive", "D. unpopular"], correct: 0, exp: "'Unrealistic' means not sensible or practical, matching the opposite of reasonable." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "7. One expects a library to be quiet, but in C it was ______.", options: ["A. not jumbled", "B. not rowdy", "C. not crowded", "D. noisy"], correct: 3, exp: "'Noisy' is the direct opposite of the expected state 'quiet'." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "8. Despite everything, J chose to keep rather than ______ the secret.", options: ["A. show", "B. reveal", "C. display", "D. announce"], correct: 1, exp: "'Keep' and 'reveal' are direct opposites in the framework of confidential information." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "9. Though the teachers disliked the idea, the principal was ______ to it.", options: ["A. forced", "B. recognized", "C. admitted", "D. reconciled"], correct: 3, exp: "To be 'reconciled to' an idea means to accept or accommodate it despite initial reservations." },

    let currentQ = 0;
    let score = 0;
    let selectedOptionIdx = null;

    function initQuiz() {
        selectedOptionIdx = null;
        document.getElementById("submit-btn").classList.remove("hidden");
        document.getElementById("submit-btn").disabled = true;
        document.getElementById("next-btn").classList.add("hidden");
        
        const current = questions[currentQ];
        document.getElementById("q-text").innerText = current.q;
        document.getElementById("instruction-box").innerText = current.instr;
        document.getElementById("question-number").innerText = `Question ${currentQ + 1} of ${questions.length}`;
        
        // Render Passage context box dynamically if it exists
        const passageContainer = document.getElementById("passage-container");
        if (current.passage) {
            passageContainer.innerText = current.passage;
            passageContainer.classList.remove("hidden");
        } else {
            passageContainer.classList.add("hidden");
        }
        
        // Dynamically compute progress filling metric
        const progressPercent = (currentQ / questions.length) * 100;
        document.getElementById("progress-fill").style.width = `${progressPercent}%`;

        const grid = document.getElementById("options-grid");
        grid.innerHTML = "";
        
        const expBar = document.getElementById("explanation-bar");
        expBar.style.display = "none";
        expBar.innerText = "";

        current.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => highlightSelection(i, btn);
            grid.appendChild(btn);
        });
    }

    function highlightSelection(index, btn) {
        selectedOptionIdx = index;
        const allBtns = document.querySelectorAll(".option-btn");
        
        allBtns.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        
        // Unlock submit validation button
        document.getElementById("submit-btn").disabled = false;
    }

    function submitAnswer() {
        if (selectedOptionIdx === null) return;
        
        const current = questions[currentQ];
        const allBtns = document.querySelectorAll(".option-btn");
        
        // Disable choices selection immediately
        allBtns.forEach(btn => {
            btn.disabled = true;
            btn.classList.remove("selected");
        });
        
        // Evaluate inputs
        if (selectedOptionIdx === current.correct) {
            allBtns[selectedOptionIdx].classList.add("correct");
            score++;
        } else {
            allBtns[selectedOptionIdx].classList.add("wrong");
            allBtns[current.correct].classList.add("correct");
        }
        
        // Display explanatory logic metrics
        const expBar = document.getElementById("explanation-bar");
        expBar.innerText = current.exp;
        expBar.style.display = "block";
        
        // Control structural action triggers
        document.getElementById("submit-btn").classList.add("hidden");
        document.getElementById("next-btn").classList.remove("hidden");
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < questions.length) {
            initQuiz();
        } else {
            showFinalResults();
        }
    }

    function showFinalResults() {
        document.getElementById("quiz-box").classList.add("hidden");
        document.getElementById("progress-fill").style.width = "100%";
        
        const resultBox = document.getElementById("result-box");
        resultBox.classList.remove("hidden");
        
        document.getElementById("final-score").innerText = `${score} / ${questions.length}`;
        
        const msg = document.getElementById("performance-msg");
        const rating = score / questions.length;
