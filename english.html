<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Language Diagnostic | STUDY-WITH-MUBARAK</title>
    <style>
        :root { 
            --success-bg: #f0fdf4;
            --success-border: #22c55e;
            --success-text: #166534;
            --danger-bg: #fef2f2;
            --danger-border: #ef4444;
            --danger-text: #991b1b;
            --primary: #2563eb; 
            --dark: #0f172a; 
            --gray: #475569;
            --card-border: #3b82f6;
        }
        body { 
            background-color: #f8fafc; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0;
            padding: 0;
            color: var(--dark);
        }
        header {
            background: var(--dark); 
            color: white; 
            padding: 35px 20px; 
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }
        header h1 { margin: 0 0 8px 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; }
        header p { margin: 0; color: #94a3b8; font-size: 1.1rem; }
        .quiz-container { 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 0 20px 60px 20px; 
            position: relative;
        }
        .progress-bar { 
            width: 100%; 
            background: #e2e8f0; 
            height: 10px; 
            border-radius: 999px; 
            margin-bottom: 35px; 
            overflow: hidden; 
        }
        #progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary), #60a5fa); 
            width: 0%; 
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        /* Grand Card Design Style Rules */
        .grand-card { 
            background: white; 
            padding: 45px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border-left: 8px solid var(--card-border);
            position: relative;
        }
        .instruction-tag {
            background: #f1f5f9;
            color: var(--gray);
            font-size: 0.95rem;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 28px;
            border-left: 4px solid var(--gray);
            line-height: 1.5;
            font-weight: 600;
        }
        .passage-box {
            background: #fffbeb;
            border: 1px solid #fef3c7;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 28px;
            font-size: 1.05rem;
            line-height: 1.75;
            color: #78350f;
            text-align: justify;
        }
        .question-text { 
            font-size: 1.35rem; 
            color: var(--dark); 
            margin-bottom: 28px; 
            font-weight: 700; 
            line-height: 1.45;
        }
        .option-btn { 
            display: block; 
            width: 100%; 
            padding: 18px 24px; 
            margin: 14px 0; 
            border: 2px solid #e2e8f0; 
            border-radius: 14px; 
            background: white; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            font-weight: 500;
            text-align: left;
            color: var(--dark);
        }
        .option-btn:hover:not([disabled]) { 
            border-color: var(--primary); 
            background: #f0f6ff; 
            transform: translateY(-1px);
        }
        .option-btn.selected {
            border-color: var(--primary);
            background: #eff6ff;
            box-shadow: 0 0 0 1px var(--primary);
        }
        
        /* Validation State Renderers for Review Section */
        .review-correct { 
            background: var(--success-bg) !important; 
            color: var(--success-text) !important; 
            border-color: var(--success-border) !important; 
            font-weight: 700;
        }
        .review-wrong { 
            background: var(--danger-bg) !important; 
            color: var(--danger-text) !important; 
            border-color: var(--danger-border) !important; 
        }

        /* Green Explanation Boxes */
        .explanation-box { 
            margin-top: 30px; 
            padding: 24px; 
            background: #f0fdf4; 
            border: 1px solid #bbf7d0;
            border-left: 6px solid var(--success-border); 
            border-radius: 16px; 
            color: var(--success-text); 
            font-weight: 500; 
            text-align: left;
            line-height: 1.65;
            font-size: 1.05rem;
        }
        .explanation-title {
            font-weight: 700;
            margin-bottom: 6px;
            color: #14532d;
            font-size: 1.1rem;
        }

        /* Top Right Corner Absolute Position for Submit Button */
        .top-submit-container {
            position: absolute;
            top: -25px;
            right: 20px;
            z-index: 10;
        }

        /* Control Panel Row Layout for Separate Nav Buttons */
        .control-panel {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 35px;
            align-items: center;
        }
        
        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 14px; /* Round Rectangular Shape */
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            text-align: center;
        }
        .action-btn:hover:not([disabled]) {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .submit-btn-style {
            background: #dc2626; /* Crimson/Red Accent for clear distinct submit action */
            box-shadow: 0 4px 6px -1px rgba(220, 38, 38, 0.2);
        }
        .submit-btn-style:hover:not([disabled]) {
            background: #b91c1c;
            box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3);
        }
        .nav-btn {
            background: #f1f5f9;
            color: var(--blue);
            border: 2px solid #e2e8f0;
            padding: 16px 28px;
            box-shadow: none;
        }
        .nav-btn:hover:not([disabled]) {
            background: #e2e8f0;
            color: var(--dark);
            border-color: #cbd5e1;
        }
        .action-btn:disabled, .nav-btn:disabled {
            background: #cbd5e1;
            color: #94a3b8;
            border-color: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
            transform: none !important;
        }
        
        /* Review Area Card Spacing */
        .review-card {
            margin-bottom: 40px;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 40px;
        }
        .review-card:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .choice-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .badge-correct { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
        .badge-wrong { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-border); }
        .hidden { display: none !important; }
        .score-display { font-size: 3.5rem; color: var(--primary); font-weight: 800; margin: 20px 0; }
    </style>
</head>
<body>

<header>
    <h1>English Language Mastery</h1>
    <p>Comprehensive Unified Assessment Bank</p>
    <div style="margin-top: 12px;"><a href="index.html" style="color: #60a5fa; text-decoration: none; font-size: 0.95rem; font-weight: 600;">🏠 Return to Study Portal</a></div>
</header>

<div class="quiz-container">
    <div id="submit-placement" class="top-submit-container">
        <button id="submit-btn" class="action-btn submit-btn-style" onclick="finishAssessment()">Submit Exam</button>
    </div>

    <div id="progress-container" class="progress-bar"><div id="progress-fill"></div></div>
    
    <div id="quiz-box" class="grand-card">
        <div id="question-number" style="color: var(--primary); font-weight: 700; margin-bottom: 12px; text-align: center; font-size: 1.1rem; letter-spacing: 0.5px; text-transform: uppercase;">Question 1</div>
        <div id="instruction-box" class="instruction-tag"></div>
        <div id="passage-container" class="passage-box hidden"></div>
        <div class="question-text" id="q-text">Setting up environment parameters...</div>
        
        <div id="options-grid"></div>
        
        <div class="control-panel">
            <button id="prev-btn" class="action-btn nav-btn" onclick="navigateQuestion(-1)">← Previous Question</button>
            <button id="next-btn" class="action-btn nav-btn" onclick="navigateQuestion(1)">Next Question →</button>
        </div>
    </div>

    <div id="result-box" class="grand-card hidden" style="text-align: center; margin-bottom: 40px;">
        <h2 style="font-size: 2.5rem; margin: 0; color: var(--dark); font-weight: 800;">Assessment Result Overview</h2>
        <div class="score-display" id="final-score">0 / 0</div>
        <p id="performance-msg" style="margin: 24px 0; color: var(--gray); font-size: 1.2rem; line-height: 1.65; max-width: 600px; margin-left: auto; margin-right: auto;"></p>
        <button class="action-btn" onclick="location.reload()" style="width: auto; display: inline-block; padding: 18px 60px;">Restart Diagnostic Session</button>
    </div>

    <div id="review-section" class="hidden">
        <h3 style="font-size: 1.8rem; font-weight: 800; color: var(--dark); margin-bottom: 25px; border-left: 6px solid var(--primary); padding-left: 15px;">Detailed Corrections & Explanations Breakdown</h3>
        <div id="review-cards-container"></div>
    </div>
</div>

<script>
    const questions = [
        // 1-5: Antonyms
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "Choose the ANTONYM of 'Garrulous':", options: ["Talkative", "Reticent", "Voluble", "Verbose"], correct: 1, exp: "Garrulous means excessively talkative. Reticent means reserved or quiet." },
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "Choose the ANTONYM of 'Enervate':", options: ["Weaken", "Exhaust", "Invigorate", "Debilitate"], correct: 2, exp: "Enervate means to drain energy. Invigorate means to give strength and energy." },
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "Choose the ANTONYM of 'Obsequious':", options: ["Submissive", "Domineering", "Servile", "Fawning"], correct: 1, exp: "Obsequious means overly obedient. Domineering means asserting one's will over others." },
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "Choose the ANTONYM of 'Ephemeral':", options: ["Fleeting", "Transient", "Perpetual", "Brief"], correct: 2, exp: "Ephemeral means short-lived. Perpetual means never-ending or permanent." },
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "Choose the ANTONYM of 'Loquacious':", options: ["Silent", "Chatty", "Fluent", "Articulate"], correct: 0, exp: "Loquacious means talkative. Silent is the direct opposite." },

        // 6-10: Synonyms
        { instr: "Choose the option most nearly identical in meaning to the given word.", q: "Choose the SYNONYM of 'Anomalous':", options: ["Normal", "Abnormal", "Regular", "Common"], correct: 1, exp: "Anomalous refers to something that deviates from what is standard or expected." },
        { instr: "Choose the option most nearly identical in meaning to the given word.", q: "Choose the SYNONYM of 'Assuage':", options: ["Aggravate", "Relieve", "Irritate", "Inflame"], correct: 1, exp: "To assuage is to make an unpleasant feeling less intense." },
        { instr: "Choose the option most nearly identical in meaning to the given word.", q: "Choose the SYNONYM of 'Cacophony':", options: ["Harmony", "Silence", "Discord", "Melody"], correct: 2, exp: "Cacophony is a harsh, discordant mixture of sounds." },
        { instr: "Choose the option most nearly identical in meaning to the given word.", q: "Choose the SYNONYM of 'Laconic':", options: ["Wordy", "Concise", "Lengthy", "Talkative"], correct: 1, exp: "Laconic means using very few words." },
        { instr: "Choose the option most nearly identical in meaning to the given word.", q: "Choose the SYNONYM of 'Meticulous':", options: ["Sloppy", "Precise", "Careless", "Hasty"], correct: 1, exp: "Meticulous means showing great attention to detail; very careful and precise." },

        // 11-15: Grammar
        { instr: "Identify the option that satisfies standard syntax rules.", q: "Grammar: Which sentence is correct?", options: ["Neither he nor I are going.", "Neither he nor I am going.", "Neither he nor I is going.", "Neither he nor I were going."], correct: 1, exp: "When using 'neither/nor', the verb agrees with the closer subject ('I am')." },
        { instr: "Select the accurate structural collective option.", q: "Grammar: Select the correct collective noun.", options: ["A flock of lions", "A pride of lions", "A pack of lions", "A school of lions"], correct: 1, exp: "Lions are grouped in a 'pride'." },
        { instr: "Choose the accurate contextual preposition.", q: "Grammar: Choose the correct preposition.", options: ["He is proficient at English.", "He is proficient in English.", "He is proficient with English.", "He is proficient by English."], correct: 1, exp: "We use 'proficient in' for subjects or skills." },
        { instr: "Identify correct orthography or contraction use.", q: "Grammar: Pick the correct word.", options: ["Its raining outside.", "It's raining outside.", "Its' raining outside.", "Its's raining outside."], correct: 1, exp: "'It's' is the contraction for 'It is'." },
        { instr: "Identify the matching grammatical word group.", q: "Grammar: Identify the adjective.", options: ["Slowly", "Run", "Beautiful", "Happiness"], correct: 2, exp: "Beautiful describes a noun; slowly is an adverb; run is a verb; happiness is a noun." },

        // 16-21: Advanced Antonyms
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "ANTONYM of 'Altruism':", options: ["Kindness", "Selfishness", "Generosity", "Benevolence"], correct: 1, exp: "Altruism is selfless concern for others. Selfishness is the opposite." },
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "ANTONYM of 'Capricious':", options: ["Unpredictable", "Stable", "Fickle", "Variable"], correct: 1, exp: "Capricious means impulsive and changing. Stable means firm and steady." },
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "ANTONYM of 'Dormant':", options: ["Inactive", "Asleep", "Active", "Static"], correct: 2, exp: "Dormant means inactive or in a deep sleep. Active is the opposite." },
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "ANTONYM of 'Fastidious':", options: ["Easygoing", "Picky", "Demanding", "Fussy"], correct: 0, exp: "Fastidious means very attentive to detail; easygoing is the opposite." },
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "ANTONYM of 'Gregarious':", options: ["Sociable", "Outgoing", "Solitary", "Friendly"], correct: 2, exp: "Gregarious means fond of company. Solitary means liking to be alone." },
        { instr: "Choose the option most nearly opposite in meaning to the given word.", q: "ANTONYM of 'adept':", options: ["Inept", "Shrewd", "Savvy", "Astute"], correct: 0, exp: "Inept means unskillful or incompetent. Adept means being skillful and competent." },

        // Contextual Antonyms (Section 1)
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "The road which used to be wide now appears ______ because it is bordered with trees.", options: ["winding", "limited", "narrow", "untarred"], correct: 2, exp: "The sentence contrasts 'wide' with its current state. 'Narrow' is the direct opposite." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "The manager is sensitive to the feelings of his subordinates, unlike the ______ manager who is insensitive to them.", options: ["appease", "insensitive", "settle", "attend"], correct: 1, exp: "The structure explicitly contrasts 'sensitive' with 'insensitive'." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "Rather than be discouraged by the plight of the workers, the manager was ______", options: ["negligent", "indifferent", "malicious", "callous"], correct: 1, exp: "If he wasn't discouraged or moved, he remained unconcerned. 'Indifferent' means showing no concern." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "A lazy student makes progress but an ______ one hardly makes any.", options: ["industrious", "nervous", "inactive", "reluctant"], correct: 0, exp: "'Industrious' means hardworking and diligent, which is opposite to 'lazy'." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "Unlike C, though the message was clearly written, D did not understand it because it was ______.", options: ["Good", "Unclear", "Vague", "Ambiguous"], correct: 1, exp: "The phrase 'clearly written' is directly contrasted with 'unclear'." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "Good policies are usually reasonable but bad ones are ______", options: ["unrealistic", "inadequate", "unattractive", "unpopular"], correct: 0, exp: "'Unrealistic' means not sensible or practical, matching the opposite of reasonable." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "One expects a library to be quiet, but in C it was ______.", options: ["not jumbled", "not rowdy", "not crowded", "noisy"], correct: 3, exp: "'Noisy' is the direct opposite of the expected state 'quiet'." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "Despite everything, J chose to keep rather than ______ the secret.", options: ["show", "reveal", "display", "announce"], correct: 1, exp: "'Keep' and 'reveal' are direct opposites in the framework of confidential information." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "Though the teachers disliked the idea, the principal was ______ to it.", options: ["forced", "recognized", "admitted", "reconciled"], correct: 3, exp: "To be 'reconciled to' an idea means to accept or accommodate it despite initial reservations." },
        { instr: "In the following sentence, choose the option that is most nearly opposite in meaning to the underlined word and fills the gap accurately.", q: "It is only natural to feel nervous when you first take the stage, but you soon become ______.", options: ["balanced", "peaceful", "normal", "composed"], correct: 3, exp: "The state of being 'composed' directly resolves the feeling of being nervous." },

        // Vocabulary Usage (Section 2)
        { instr: "From the options lettered A to D, choose the word that best completes each sentence.", q: "Don’t tell me you are ______ enough to believe his lies.", options: ["credible", "childish", "modest", "naive"], correct: 3, exp: "'Naive' describes someone showing a lack of experience, wisdom, or judgment." },
        { instr: "From the options lettered A to D, choose the word that best completes each sentence.", q: "The members of parliament tabled ______ to the constitution.", options: ["adjustment", "amendment", "enactment", "enact"], correct: 1, exp: "An 'amendment' is a formal structural change made to a legislative or constitutional text." },
        { instr: "From the options lettered A to D, choose the word that best completes each sentence.", q: "His ______ to violent video games is something to worry about.", options: ["devotion", "addiction", "commitment", "assignment"], correct: 1, exp: "'Addiction' matches the context of compulsive dependency on games." },
        { instr: "From the options lettered A to D, choose the word that best completes each sentence.", q: "Most people think that ______ punishment should be abolished, even in murder cases.", options: ["feel", "capital", "severe", "corporal"], correct: 1, exp: "'Capital punishment' refers explicitly to execution or execution mandates sanctioned by law." },
        { instr: "From the options lettered A to D, choose the word that best completes each sentence.", q: "The President made a ______ appeal for calm in the face of the crisis.", options: ["passive", "serious", "active", "sensitive"], correct: 1, exp: "A 'serious appeal' emphasizes an urgent, highly sincere plea." },
        { instr: "From the options lettered A to D, choose the word that best completes each sentence.", q: "After my mother ______, my father sat down and raised his voice.", options: ["had down and rained abuses on me", "broke down in tears and made a silent confession", "became completely quiet and collected", "left the room abruptly"], correct: 1, exp: "This selection constructs a logical sequence of narrative actions prior to the response." },
        { instr: "From the options lettered A to D, choose the word that best completes each sentence.", q: "The boy’s parents ______ a sigh of relief when the meeting ended happily.", options: ["breathed", "raised", "heaved", "shielded"], correct: 2, exp: "The correct linguistic idiomatic collocation is to 'heave a sigh of relief'." },
        { instr: "From the options lettered A to D, choose the word that best completes each sentence.", q: "We had not reconvened ______ because we could not form a quorum.", options: ["earlier", "formerly", "then", "previously"], correct: 0, exp: "'Earlier' functions as an adverbial modifier indicating previous time reference." },
        { instr: "From the options lettered A to D, choose the word that best completes each sentence.", q: "The policeman tried to ______ money from the motorist.", options: ["extort", "exert", "extract", "extricate"], correct: 0, exp: "'Extort' means to obtain something through force, intimidation, or abuse of authority." },
        { instr: "From the options lettered A to D, choose the word that best completes each sentence.", q: "They were given an ______ to either pay a fine or vacate the premises.", options: ["option", "injunction", "ultimatum", "undertaking"], correct: 2, exp: "An 'ultimatum' is a final demand backed by a structural threat of consequence." },

        // Sentence Interpretation (Section 3)
        { instr: "Choose the interpretation that is most appropriate for each sentence.", q: "My parents carried the day in the debate. This means that my parents ______.", options: ["missed the date for the debate", "won the debate", "lost the debate", "chaired the debate"], correct: 1, exp: "The idiom 'carry the day' means to win a contest or secure victory." },
        { instr: "Choose the interpretation that is most appropriate for each sentence.", q: "We discussed the issue at length but many new elements came up. This means that we ______.", options: ["discussed many alternative subjects", "exhausted every perspective", "used up many resources", "discussed the issue for a long time"], correct: 3, exp: "'At length' means for a comprehensive or extended duration of time." },
        { instr: "Choose the interpretation that is most appropriate for each sentence.", q: "We saw Ada dancing at the end of the party. This means that ______.", options: ["Ada danced a lot", "we saw Ada dance", "we witnessed the specific ongoing act of Ada dancing", "Ada was dancing alone"], correct: 2, exp: "The present participle construction models active ongoing perception." },
        { instr: "Choose the interpretation that is most appropriate for each sentence.", q: "The first time we saw Ada dancing with everyone, Baba backed the wrong horse. This means that ______.", options: ["Baba made an unfortunate bet on a real animal", "we were surprised that Baba made an incorrect choice or prediction", "we were surprised that Baba was not dancing", "Baba supported the winning side"], correct: 1, exp: "'Back the wrong horse' is an idiom meaning to support a losing or incorrect option." },
        { instr: "Choose the interpretation that is most appropriate for each sentence.", q: "I knew they were being dishonest when I saw them. This means that ______.", options: ["I knew they were completely honest structures", "I caught them in a state that lacked integrity", "I knew they were simulating a lie continuously", "I misjudged their background values"], correct: 1, exp: "'Being dishonest' relates to actively exhibiting deceptive profiles at that moment." },
        { instr: "Choose the interpretation that is most appropriate for each sentence.", q: "My mother wanted to know what I was eating. This means that she wanted to ______.", options: ["find out what I was eating", "prevent me from swallowing items", "know what I had eaten hours ago", "prepare a completely new dish"], correct: 0, exp: "'Wanted to know' translates directly to seeking clarification or discovering facts." },

        // Comprehension Cloze (Section 4)
        { 
            instr: "Read the passage context to choose the word that best fits the blank gap.",
            passage: "The young doctor looked sprightly in his white coat. Displaying a [27] very complacently on his neck, he walked through the [28] greeting each of the [29] who greeted him in return. Then suddenly, his eyes caught a woman on a nearby [30]. He went closer, held her hand, feeling for her [31], and then carried out some other minor [32]. After he had elicited one or two answers from the woman, the young doctor ordered, 'Stretcher, quickly; take her to the [33].' Even the [34] who had been supervising her treatment was amazed. As the woman was being wheeled to the operating room, one of the nurses asked, 'Are you sure doctor, that she is for surgery?' The young doctor did not mince words; he said to her, 'This is an ectopic pregnancy, no mistake about it. The [35] must be taken out promptly.' That was it. Within minutes, the operation began. While this was going on, blood was being pumped for [36].",
            q: "Select the best fit for gap 27:", 
            options: ["Sham", "Badge", "Stethoscope", "Watch"], 
            correct: 2, 
            exp: "Medical practitioners standardly wear a stethoscope surrounding their neck structures." 
        },
        { 
            instr: "Read the passage context to choose the word that best fits the blank gap.",
            passage: "The young doctor looked sprightly in his white coat. Displaying a [27] very complacently on his neck, he walked through the [28] greeting each of the [29] who greeted him in return. Then suddenly, his eyes caught a woman on a nearby [30]. He went closer, held her hand, feeling for her [31], and then carried out some other minor [32]. After he had elicited one or two answers from the woman, the young doctor ordered, 'Stretcher, quickly; take her to the [33].' Even the [34] who had been supervising her treatment was amazed. As the woman was being wheeled to the operating room, one of the nurses asked, 'Are you sure doctor, that she is for surgery?' The young doctor did not mince words; he said to her, 'This is an ectopic pregnancy, no mistake about it. The [35] must be taken out promptly.' That was it. Within minutes, the operation began. While this was going on, blood was being pumped for [36].",
            q: "Select the best fit for gap 28:", 
            options: ["Alale", "Office", "Room", "ward"], 
            correct: 3, 
            exp: "A hospital contains specialized clinical units called 'wards' containing patient arrays."

        // Configure Navigation Buttons States
        document.getElementById("prev-btn").disabled = (currentQ === 0);
        document.getElementById("next-btn").disabled = (currentQ === questions.length - 1);

        const grid = document.getElementById("options-grid");
        grid.innerHTML = "";
        
        current.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            
            // Reapply styling if the user previously selected this option
            if (userAnswers[currentQ] === i) {
                btn.classList.add("selected");
            }
            
            btn.onclick = () => selectOption(i);
            grid.appendChild(btn);
        });
    }

    function selectOption(index) {
        userAnswers[currentQ] = index;
        const allBtns = document.querySelectorAll(".option-btn");
        allBtns.forEach(b => b.classList.remove("selected"));
        allBtns[index].classList.add("selected");
    }

    function navigateQuestion(direction) {
        currentQ += direction;
        if (currentQ >= 0 && currentQ < questions.length) {
            initQuiz();
        }
    }

    function finishAssessment() {
        // Calculate Total Correct Answers
        let totalScore = 0;
        questions.forEach((q, idx) => {
            if (userAnswers[idx] === q.correct) {
                totalScore++;
            }
        });

        // Hide Exam View Portal Elements and top floating submit container
        document.getElementById("quiz-box").classList.add("hidden");
        document.getElementById("progress-container").classList.add("hidden");
        document.getElementById("submit-placement").classList.add("hidden");

        // Display Score and Performance Remarks Box
        const resultBox = document.getElementById("result-box");
        resultBox.classList.remove("hidden");
        document.getElementById("final-score").innerText = `${totalScore} / ${questions.length}`;
        
        const msg = document.getElementById("performance-msg");
        const rating = totalScore / questions.length;
        if (rating >= 0.85) {
            msg.innerText = "Excellent capability level! Your high score demonstrates an exceptional mastery of oral English stress models, grammatical syntax structures, and critical reading comprehension metrics.";
        } else if (rating >= 0.65) {
            msg.innerText = "Solid job! You have a firm grasp of vocabulary meanings and antonym relationships. Review the explanations on complex syllable rules to achieve full alignment.";
        } else {
            msg.innerText = "A good foundation! English diagnostics require focused repetitions. Go through the structural insight rationales, restart the tracking module, and keep elevating your skills.";
        }

        // Render Comprehensive Results Block below
        renderReviewSection();
    }

    function renderReviewSection() {
        const reviewContainer = document.getElementById("review-cards-container");
        reviewContainer.innerHTML = "";

        questions.forEach((q, idx) => {
            const card = document.createElement("div");
            card.className = "review-card";

            // Header Numbering info
            const titleInfo = document.createElement("div");
            titleInfo.style.fontWeight = "700";
            titleInfo.style.color = "var(--primary)";
            titleInfo.style.marginBottom = "8px";
            titleInfo.innerText = `QUESTION ${idx + 1}`;
            card.appendChild(titleInfo);

            // Instruction Tag
            const instTag = document.createElement("div");
            instTag.className = "instruction-tag";
            instTag.style.padding = "10px 15px";
            instTag.style.marginBottom = "15px";
            instTag.innerText = q.instr;
            card.appendChild(instTag);

            // Text Content Passages
            if (q.passage) {
                const passBox = document.createElement("div");
                passBox.className = "passage-box";
                passBox.style.padding = "15px";
                passBox.style.fontSize = "0.95rem";
                passBox.innerText = q.passage;
                card.appendChild(passBox);
            }

            // Question String Text
            const qText = document.createElement("div");
            qText.className = "question-text";
            qText.style.fontSize = "1.15rem";
            qText.style.marginBottom = "15px";
            qText.innerText = q.q;
            card.appendChild(qText);

            // Choice Badge Marker
            const badge = document.createElement("span");
            const chosenIdx = userAnswers[idx];
            if (chosenIdx === null) {
                badge.className = "choice-badge badge-wrong";
                badge.innerText = "⚠️ Left Unanswered";
            } else if (chosenIdx === q.correct) {
                badge.className = "choice-badge badge-correct";
                badge.innerText = "✅ Correct Choice";
            } else {
                badge.className = "choice-badge badge-wrong";
                badge.innerText = "❌ Incorrect Choice";
            }
            card.appendChild(badge);

            // Options Output Stack
            const optGrid = document.createElement("div");
            q.options.forEach((opt, oIdx) => {
                const optBtn = document.createElement("button");
                optBtn.className = "option-btn";
                optBtn.innerText = opt;
                optBtn.disabled = true; // Review state options are non-clickable

                // Styling logic for tracking user selection vs actual answer key
                if (oIdx === q.correct) {
                    optBtn.classList.add("review-correct");
                } else if (oIdx === chosenIdx) {
                    optBtn.classList.add("review-wrong");
                }
                optGrid.appendChild(optBtn);
            });
            card.appendChild(optGrid);

            // Emerald Green Explanation container box
            const expBox = document.createElement("div");
            expBox.className = "explanation-box";
            expBox.innerHTML = `<div class="explanation-title">💡 Performance Insight & Solution Rationale:</div><div>${q.exp}</div>`;
            card.appendChild(expBox);

            reviewContainer.appendChild(card);
        });

        // Make Section visible onto UI layout layer
        document.getElementById("review-section").classList.remove("hidden");
        
        // Scroll smoothly to review section
        document.getElementById("review-section").scrollIntoView({ behavior: 'smooth' });
    }

    // Launch Core Application Module
    document.addEventListener("DOMContentLoaded", initQuiz);
</script>

</body>
</html>
