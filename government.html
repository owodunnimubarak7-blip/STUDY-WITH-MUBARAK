    <meta charset="UTF-8">

    <style>
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --success: #10b981;
            --bg: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--secondary); line-height: 1.6; }
        header { background: var(--secondary); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--primary); }
        .container { max-width: 700px; margin: 40px auto; padding: 0 20px; padding-bottom: 100px; }

        /* Progress Bar */
        .progress-container { margin-bottom: 30px; }
        .progress-text { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 10px; font-size: 0.9rem; }
        .bar-bg { background: #e2e8f0; height: 10px; border-radius: 5px; overflow: hidden; }
        .bar-fill { background: var(--primary); height: 100%; width: 4%; transition: 0.4s ease; }

        /* Quiz Card */
        .quiz-card {
            background: white; border-radius: 20px; padding: 40px; 
            box-shadow: var(--card-shadow); border-left: 12px solid var(--primary);
            min-height: 350px; display: flex; flex-direction: column;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .question-header { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; }
        
        .options-list { display: grid; gap: 15px; flex-grow: 1; }
        .option {
            padding: 18px; border: 2px solid #f1f5f9; border-radius: 12px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center;
            background: #f8fafc; font-weight: 500;
        }
        .option:hover { border-color: var(--primary); background: #eff6ff; }
        .option.selected { border-color: var(--primary); background: #dbeafe; box-shadow: 0 0 0 2px var(--primary); }
        
        .btn-next { 
            background: var(--primary); color: white; width: 100%; margin-top: 30px;
            padding: 18px; border-radius: 12px; border: none; font-weight: 700;
            cursor: pointer; font-size: 1.1rem;
        }
        .btn-next:disabled { background: #94a3b8; cursor: not-allowed; }
        
        /* Results & Review */
        #results-screen { display: none; }
        .score-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: var(--card-shadow); margin-bottom: 30px; }
        .score-num { font-size: 4rem; font-weight: 900; color: var(--primary); }
        
        .review-item { background: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; border-left: 5px solid var(--success); }
        .exp-box { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 8px; margin-top: 15px; color: #166534; font-size: 0.95rem; }
    </style>

    let currentQ = 0, score = 0, selectedIndex = null;

    function loadQuestion() {
        const q = quizData[currentQ];
        document.getElementById('question-text').innerText = `${currentQ + 1}. ${q.q}`;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.a.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                div.classList.add('selected');
                selectedIndex = idx;
                document.getElementById('next-btn').disabled = false;
            };
            container.appendChild(div);
        });
        document.getElementById('current-count').innerText = `Question ${currentQ + 1} of 25`;
        document.getElementById('progress-bar').style.width = ((currentQ + 1) / 25 * 100) + '%';
        document.getElementById('next-btn').disabled = true;
    }

    function nextQuestion() {
        if (selectedIndex === quizData[currentQ].correct) score++;
        currentQ++;
        if (currentQ < quizData.length) loadQuestion();
        else showResults();
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / 25`;
        document.getElementById('feedback-msg').innerText = score > 18 ? "Excellent! You are ready for the exam." : "Keep studying and review the explanations below.";
        
        const review = document.getElementById('review-container');
        quizData.forEach((item, i) => {
            review.innerHTML += `
                <div class="review-item">
                    <strong>${i+1}. ${item.q}</strong><br>
                    <div class="exp-box"><strong>Correct Answer:</strong> ${item.a[item.correct]}<br><br><strong>Explanation:</strong> ${item.exp}</div>
                </div>`;
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
