<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOVPRO ULTIMATE CBT v2 | STUDY-WITH-MUBARAK</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
    --primary: #1d4ed8; --accent: #059669; --danger: #dc2626; --warning: #d97706;
    --bg: #f1f5f9; --card: rgba(255,255,255,0.9);
}
[data-theme="dark"] { --bg: #0f172a; --card: rgba(30,41,59,0.9); color: #e2e8f0; }
* { box-sizing: border-box; font-family: 'Manrope', sans-serif; }
body { margin:0; background: var(--bg); }
header { background: linear-gradient(135deg, var(--primary), #4338ca); color:white; padding:12px 30px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:999; }
.container { max-width: 1300px; margin:20px auto; padding:20px; display:grid; grid-template-columns: 1fr 340px; gap:20px; }
@media(max-width:1000px){.container{grid-template-columns:1fr;} }
.glass { background: var(--card); backdrop-filter: blur(20px); border-radius:20px; padding:25px; box-shadow:0 10px 40px rgba(0,0,0,0.1); }
input, textarea, select { width:100%; padding:12px; border-radius:10px; border:2px solid #cbd5e1; margin-top:8px; font-weight:600; }
.btn { padding:14px; border:none; border-radius:12px; font-weight:700; cursor:pointer; }
.btn-primary { background: var(--primary); color:white; }
.btn-danger { background: var(--danger); color:white; }
.btn-success { background: var(--accent); color:white; }
.timer { font-size:1.8rem; font-weight:900; color:var(--danger); }
.options{display:grid; gap:12px; margin:20px 0;}
.option{padding:16px; border:2px solid #e2e8f0; border-radius:14px; cursor:pointer;}
.option.selected{border-color:var(--primary); background:#dbeafe; font-weight:700;}
.palette{display:grid; grid-template-columns:repeat(5,1fr); gap:8px;}
.p-box{aspect-ratio:1; display:flex; align-items:center; justify-content:center; border:2px solid #cbd5e1; border-radius:10px; font-weight:700; cursor:pointer;}
.p-box.current{background:var(--primary); color:white;}
.p-box.answered{background:var(--accent); color:white;}
.modal{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:1000;}
.modal-content{background:var(--card); padding:30px; border-radius:20px; width:95%; max-width:900px; max-height:90vh; overflow-y:auto;}
.admin-table { width:100%; border-collapse:collapse; }
.admin-table td,.admin-table th { border:1px solid #ddd; padding:8px; font-size:0.85rem; }
</style>
</head>
<body>

<!-- LOGIN + ADMIN BUTTON -->
<div id="login-screen" class="glass" style="max-width:450px; margin:80px auto;">
    <h2>🏛️ GOVPRO CBT Login</h2>
    <label>Full Name</label><input id="student-name">
    <label>Exam Mode</label>
    <select id="exam-mode">
        <option value="jamb">JAMB - 40Q / 40min</option>
        <option value="waec">WAEC - 50Q / 60min</option>
        <option value="practice">Practice - 100Q</option>
    </select>
    <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="startSession()">Start Examination</button>
    <button class="btn" style="width:100%; margin-top:10px; background:#e2e8f0;" onclick="openAdmin()">⚙️ Admin Panel</button>
</div>

<!-- ADMIN PANEL -->
<div class="modal" id="admin-modal">
<div class="modal-content">
    <h2>⚙️ Admin Panel - Question Manager</h2>
    <button class="btn btn-success" onclick="showAddForm()">+ Add New Question</button>
    <button class="btn" onclick="exportQuestions()">📤 Export JSON</button>
    <button class="btn" onclick="closeModal('admin-modal')">Close</button>

    <h3 style="margin-top:20px;">Bulk Import</h3>
    <textarea id="bulk-import" rows="5" placeholder='[{"q":"...","a":["A","B"],"c":0,"t":"Topic","e":"..."}]'></textarea>
    <button class="btn btn-primary" onclick="importQuestions()">Import</button>

    <h3 style="margin-top:20px;">All Questions (<span id="q-count">0</span>)</h3>
    <input id="search-q" placeholder="Search questions..." onkeyup="renderAdminTable()">
    <table class="admin-table"><thead><tr><th>#</th><th>Question</th><th>Topic</th><th>Action</th></tr></thead><tbody id="admin-table-body"></tbody></table>
</div>
</div>

<!-- ADD/EDIT QUESTION FORM -->
<div class="modal" id="question-form-modal">
<div class="modal-content">
    <h3 id="form-title">Add Question</h3>
    <input id="f-q" placeholder="Question">
    <input id="f-a0" placeholder="Option A"><input id="f-a1" placeholder="Option B">
    <input id="f-a2" placeholder="Option C"><input id="f-a3" placeholder="Option D">
    <label>Correct Answer Index 0-3</label><input id="f-c" type="number" min="0" max="3">
    <input id="f-t" placeholder="Topic e.g. Democracy">
    <input id="f-y" placeholder="Year e.g. 2020">
    <textarea id="f-e" placeholder="Explanation"></textarea>
    <button class="btn btn-success" onclick="saveQuestion()">Save</button>
    <button class="btn" onclick="closeModal('question-form-modal')">Cancel</button>
</div>
</div>

<!-- CBT SCREEN -->
<div id="cbt-screen" style="display:none;">
<header><h3 id="student-display">Student</h3><div class="timer" id="timer">40:00</div></header>
<div class="container">
    <div class="glass">
        <div>Q <b id="q-num">1</b>/<b id="q-total">40</b> <button style="float:right" onclick="toggleFlag()">🚩</button></div>
        <span style="background:var(--primary); color:white; padding:5px 10px; border-radius:20px; font-size:0.8rem;" id="topic-badge">Topic</span>
        <h2 id="q-text">Loading...</h2>
        <div class="options" id="options"></div>
        <div id="explanation" style="display:none; background:#f0fdf4; padding:15px; border-radius:12px;"></div>
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:20px;">
            <button class="btn" onclick="nav(-1)">← Prev</button>
            <button class="btn" onclick="nav(1)">Next →</button>
            <button class="btn btn-success" onclick="submitExam()">Submit</button>
        </div>
    </div>
    <div class="glass"><h3>Palette</h3><div class="palette" id="palette"></div></div>
</div>
</div>

<!-- RESULTS -->
<div id="results-screen" style="display:none;" class="container">
    <div class="glass" style="grid-column:span 2;">
        <h2>📈 Result for <span id="result-name"></span></h2>
        <h1 id="score">0%</h1>
        <canvas id="topicChart"></canvas>
        <button class="btn btn-primary" onclick="location.reload()">Retake</button>
    </div>
</div>

<script>
// ====== 1. FULL QUESTION BANK - ADD 500+ HERE ======
let fullQuestionBank = [
    {q:"The first capital of Nigeria was?", a:["Lagos","Abuja","Calabar","Enugu"], c:2, t:"Pre-Colonial", y:2005, e:"Calabar was first capital of Southern Protectorate"},
    {q:"Which body conducts JAMB?", a:["WAEC","NECO","JAMB","NABTEB"], c:2, t:"Educational Bodies", y:2018, e:"JAMB conducts UTME"},
    {q:"The 1999 constitution is?", a:["Unitary","Federal","Confederal","Parliamentary"], c:1, t:"Constitution", y:2019, e:"Nigeria practices federalism"},
    {q:"ECOWAS HQ is in?", a:["Abuja","Accra","Dakar","Lagos"], c:0, t:"International Org", y:2020, e:"Located in Abuja"},
    {q:"One feature of democracy is?", a:["Decree","Free press","One party","Censorship"], c:1, t:"Democracy", y:2021, e:"Free press ensures accountability"},
    // PASTE 495 MORE QUESTIONS HERE FOLLOWING SAME FORMAT
];
let questionBank = JSON.parse(localStorage.getItem('govpro_questions')) || fullQuestionBank;

// ====== 2. ADMIN PANEL LOGIC ======
let editingIndex = null;
function openAdmin(){ document.getElementById('admin-modal').style.display='flex'; renderAdminTable(); }
function closeModal(id){ document.getElementById(id).style.display='none'; }
function renderAdminTable(){
    const tbody = document.getElementById('admin-table-body'); tbody.innerHTML='';
    const search = document.getElementById('search-q').value.toLowerCase();
    questionBank.filter(q=>q.q.toLowerCase().includes(search)).forEach((q,i)=>{
        tbody.innerHTML += `<tr><td>${i+1}</td><td>${q.q}</td><td>${q.t}</td>
        <td><button onclick="editQuestion(${i})">Edit</button> <button onclick="deleteQuestion(${i})">Delete</button></td></tr>`;
    });
    document.getElementById('q-count').innerText = questionBank.length;
}
function showAddForm(){ editingIndex=null; document.getElementById('form-title').innerText='Add Question'; clearForm(); document.getElementById('question-form-modal').style.display='flex'; }
function editQuestion(i){ editingIndex=i; const q=questionBank[i]; document.getElementById('form-title').innerText='Edit Question';
    document.getElementById('f-q').value=q.q; q.a.forEach((opt,j)=>document.getElementById(`f-a${j}`).value=opt);
    document.getElementById('f-c').value=q.c; document.getElementById('f-t').value=q.t; document.getElementById('f-y').value=q.y; document.getElementById('f-e').value=q.e;
    document.getElementById('question-form-modal').style.display='flex';
}
function saveQuestion(){
    const newQ = {
        q:document.getElementById('f-q').value,
        a:[f-a0.value,f-a1.value,f-a2.value,f-a3.value],
        c:parseInt(f-c.value), t:f-t.value, y:parseInt(f-y.value), e:f-e.value
    };
    if(editingIndex===null) questionBank.push(newQ); else questionBank[editingIndex]=newQ;
    localStorage.setItem('govpro_questions', JSON.stringify(questionBank)); closeModal('question-form-modal'); renderAdminTable();
}
function deleteQuestion(i){ if(confirm("Delete?")){ questionBank.splice(i,1); localStorage.setItem('govpro_questions', JSON.stringify(questionBank)); renderAdminTable(); } }
function clearForm(){ ['f-q','f-a0','f-a1','f-a2','f-a3','f-c','f-t','f-y','f-e'].forEach(id=>document.getElementById(id).value=''); }
function exportQuestions(){ const data=JSON.stringify(questionBank, null, 2); navigator.clipboard.writeText(data); alert("Copied to clipboard!"); }
function importQuestions(){ try{ const data=JSON.parse(document.getElementById('bulk-import').value); questionBank=[...questionBank,...data]; localStorage.setItem('govpro_questions', JSON.stringify(questionBank)); alert("Imported!"); renderAdminTable(); }catch(e){alert("Invalid JSON")} }

// ====== 3. CBT ENGINE LOGIC ======
let student={}, examQ=[], cur=0, answers={}, flagged=new Set(), time=2400, timer;
function startSession(){
    student.name=document.getElementById('student-name').value||"Guest";
    const mode=document.getElementById('exam-mode').value;
    time=mode==='jamb'?2400:3600; let count=mode==='jamb'?40:50;
    examQ=[...questionBank].sort(()=>0.5-Math.random()).slice(0,count);
    document.getElementById('login-screen').style.display='none';
    document.getElementById('cbt-screen').style.display='block';
    document.getElementById('student-display').innerText=student.name;
    document.getElementById('q-total').innerText=examQ.length;
    buildPalette(); render(); startTimer();
}
function render(){ const q=examQ[cur]; document.getElementById('q-num').innerText=cur+1; document.getElementById('q-text').innerText=q.q; document.getElementById('topic-badge').innerText=q.t;
    const box=document.getElementById('options'); box.innerHTML='';
    q.a.forEach((opt,i)=>{ const div=document.createElement('div'); div.className='option'; if(answers[cur]===i)div.classList.add('selected');
        div.innerHTML=`<b>${String.fromCharCode(65+i)}.</b> ${opt}`; div.onclick=()=>{answers[cur]=i; render(); updatePalette();}; box.appendChild(div); });
    updatePalette();
}
function buildPalette(){ const p=document.getElementById('palette'); p.innerHTML=''; examQ.forEach((_,i)=>{ const d=document.createElement('div'); d.className='p-box'; d.innerText=i+1; d.onclick=()=>{cur=i; render();}; p.appendChild(d);}); }
function updatePalette(){ document.querySelectorAll('.p-box').forEach((b,i)=>{ b.className='p-box'; if(i===cur)b.classList.add('current'); if(answers[i]!==undefined)b.classList.add('answered'); if(flagged.has(i))b.style.background='var(--warning)'; }); }
function nav(d){ if(cur+d>=0 && cur+d<examQ.length){cur+=d; render();} }
function toggleFlag(){ flagged.has(cur)?flagged.delete(cur):flagged.add(cur); updatePalette(); }
function startTimer(){ clearInterval(timer); timer=setInterval(()=>{ if(time>0){time--; let m=Math.floor(time/60),s=time%60; document.getElementById('timer').innerText=`${m}:${s<10?'0':''}${s}`; } else submitExam(); },1000); }
function submitExam(){ clearInterval(timer); document.getElementById('cbt-screen').style.display='none'; document.getElementById('results-screen').style.display='block';
    let correct=Object.keys(answers).filter(i=>answers[i]===examQ[i].c).length; let percent=Math.round(correct/examQ.length*100);
    document.getElementById('result-name').innerText=student.name; document.getElementById('score').innerText=percent+'%';
    const topicStats={}; examQ.forEach((q,i)=>{ if(!topicStats[q.t])topicStats[q.t]={t:0,c:0}; topicStats[q.t].t++; if(answers[i]===q.c)topicStats[q.t].c++; });
    new Chart(document.getElementById('topicChart'), { type:'bar', data:{ labels:Object.keys(topicStats), datasets:[{label:'Accuracy %', data:Object.values(topicStats).map(x=>Math.round(x.c/x.t*100))}] }});
}

// Keyboard
document.addEventListener('keydown', e=>{ if(['1','2','3','4'].includes(e.key)) {answers[cur]=parseInt(e.key)-1; render();} if(e.key==='ArrowRight')nav(1); if(e.key==='ArrowLeft')nav(-1); });
</script>
</body>
</html>
