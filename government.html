<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master CBT | STUDY-WITH-MUBARAK</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --accent: #10b981;
            --danger: #ef4444;
            --bg: #f1f5f9;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            margin: 0; color: var(--secondary); line-height: 1.6;
        }

        header { 
            background: var(--secondary); color: white; padding: 25px; text-align: center;
            border-bottom: 6px solid var(--primary); box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        /* Setup Screen - Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px);
            padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid white; text-align: center;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; text-align: left; }
        .full-width { grid-column: span 2; }
        
        label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--primary); font-size: 0.9rem; }
        
        /* Fixed Vertical Year Selector */
        select { 
            width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; 
            font-size: 1rem; font-weight: 600; cursor: pointer; background: white;
        }

        .btn-all { 
            background: var(--secondary); color: white; margin-bottom: 15px; border: none; 
            padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: 700;
        }

        .btn-launch { 
            background: var(--primary); color: white; border: none; font-size: 1.2rem; 
            padding: 20px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 800;
        }

        /* Quiz UI */
        #quiz-ui { display: none; }
        .q-card {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-left: 15px solid var(--primary); position: relative;
        }

        .option {
            padding: 18px; border: 2px solid #f1f5f9; border-radius: 15px;
            margin-top: 12px; cursor: pointer; transition: 0.3s; font-weight: 500;
        }
        .option:hover { border-color: var(--primary); background: #f8faff; }
        .option.selected { border-color: var(--primary); background: #dbeafe; font-weight: 700; }
        
        /* Review Colors */
        .option.correct-ans { border-color: var(--accent); background: #dcfce7; color: #166534; border-width: 3px; }
        .option.wrong-ans { border-color: var(--danger); background: #fee2e2; color: #991b1b; border-width: 3px; }

        /* Jump Grid */
        .jump-grid {
            display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px;
            padding: 20px; background: rgba(255,255,255,0.6); border-radius: 18px;
        }
        .jump-box {
            width: 45px; height: 45px; background: white; border: 2px solid #cbd5e1;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; cursor: pointer; font-weight: 800;
        }
        .jump-box.active { background: var(--primary); color: white; border-color: var(--primary); }
        .jump-box.filled { background: #dcfce7; border-color: var(--accent); }

        .nav-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn-nav { padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        .prev { background: #e2e8f0; color: #475569; }
        .next { background: var(--primary); color: white; }
        .submit { background: var(--accent); color: white; grid-column: span 2; margin-top: 10px; }

        .status-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800; }
        .explanation-box { background: #f0fdf4; border-left: 5px solid var(--accent); padding: 20px; margin-top: 20px; border-radius: 12px; display: none; }
    </style>
</head>
<body>

<header>
    <h1>STUDY-WITH-MUBARAK</h1>
    <p>Advanced CBT Examination System</p>
</header>

<div class="container">
    <div id="setup-screen" class="glass-card">
        <h2>Exam Configuration</h2>
        <div class="form-grid">
            <div>
                <label>Examination Body</label>
                <select id="exam-body">
                    <option value="JAMB">JAMB (UTME)</option>
                    <option value="WAEC">WAEC (WASSCE)</option>
                    <option value="NECO">NECO (SSCE)</option>
                </select>
            </div>
            <div>
                <label>Examination Year (2000 - 2026)</label>
                <select id="exam-year" size="5">
                    <option value="random" selected>Random Year</option>
                    </select>
            </div>
            <div class="full-width">
                <label>Constitutional Development</label>
                <button class="btn-all" onclick="forceAllTopics()">SELECT ALL TOPICS</button>
                <select id="exam-topic">
                    <option value="all">Custom Topic Selection...</option>
                    </select>
            </div>
        </div>
        <button class="btn-launch" onclick="startExam()">START EXAMINATION</button>
    </div>

    <div id="quiz-ui">
        <div class="status-header">
            <span id="q-progress" style="color: var(--primary);">Question 1</span>
            <span id="timer-display" style="color: var(--danger);">Time: 20:00</span>
        </div>
        
        <div class="q-card">
            <h3 id="q-text" style="margin-top: 0; font-size: 1.4rem;"></h3>
            <div id="options-box"></div>
            <div id="explanation" class="explanation-box"></div>

            <div class="nav-footer">
                <button class="btn-nav prev" onclick="nav(-1)">Previous</button>
                <button class="btn-nav next" onclick="nav(1)">Next Question</button>
                <button class="btn-nav submit" id="master-submit" onclick="finishExam()">SUBMIT EXAMINATION NOW</button>
            </div>
        </div>

        <div class="jump-grid" id="jump-grid"></div>
    </div>
</div>

<script>
    // 1. DATA BANK - ADD QUESTIONS HERE
    const questions = [
        { q: "The 1999 Constitution of Nigeria is described as?", a: ["Flexible", "Rigid", "Unwritten", "Unitary"], c: 1, e: "The 1999 Constitution is rigid because it requires a rigorous amendment process involving 2/3 of the National Assembly and State Houses.", t: "Constitutional Development" },
        { q: "In the pre-colonial Hausa system, the Ma'aji was the?", a: ["Chief Judge", "Treasurer", "Army Commander", "Head of Market"], c: 1, e: "The Ma'aji was responsible for the treasury and financial matters.", t: "Pre-Colonial Administration" }
    ];

    // 2. INITIALIZATION
    let session = [], cur = 0, userAns = {}, isReview = false, timeLeft = 1200, timerId = null;

    window.onload = () => {
        // Build Year List (2000-2026)
        const yrSelect = document.getElementById('exam-year');
        for(let i=2026; i>=2000; i--) {
            const o = document.createElement('option'); o.value = i; o.innerText = i;
            yrSelect.appendChild(o);
        }

        // Build Topic List Dynamically from Questions
        const topicSelect = document.getElementById('exam-topic');
        const uniqueTopics = [...new Set(questions.map(q => q.t))];
        uniqueTopics.forEach(t => {
            const o = document.createElement('option'); o.value = t; o.innerText = t;
            topicSelect.appendChild(o);
        });
    };

    function forceAllTopics() { document.getElementById('exam-topic').value = "all"; }

    function startExam() {
        const topic = document.getElementById('exam-topic').value;
        session = topic === 'all' ? questions : questions.filter(x => x.t === topic);
        
        if(session.length === 0) return alert("Please add questions to this topic first!");

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        
        buildJumpGrid();
        render();
        runTimer();
    }

    function buildJumpGrid() {
        const g = document.getElementById('jump-grid');
        g.innerHTML = '';
        session.forEach((_, i) => {
            const b = document.createElement('div');
            b.className = 'jump-box'; b.id = `jump-${i}`; b.innerText = i+1;
            b.onclick = () => { cur = i; render(); };
            g.appendChild(b);
        });
    }

    function render() {
        const q = session[cur];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('q-progress').innerText = `Question ${cur+1} of ${session.length}`;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const d = document.createElement('div');
            d.className = 'option';
            if(userAns[cur] === i) d.classList.add('selected');

            if(isReview) {
                if(i === q.c) d.classList.add('correct-ans');
                else if(userAns[cur] === i && i !== q.c) d.classList.add('wrong-ans');
                d.innerText = (i === q.c ? "✓ " : (userAns[cur] === i ? "✗ " : "")) + opt;
            } else {
                d.innerText = opt;
                d.onclick = () => { userAns[cur] = i; updateJumpUI(); render(); };
            }
            box.appendChild(d);
        });

        if(isReview) {
            document.getElementById('explanation').style.display = 'block';
            document.getElementById('explanation').innerHTML = `<strong>Explanation:</strong> ${q.e}`;
        }

        document.querySelectorAll('.jump-box').forEach(b => b.classList.remove('active'));
        document.getElementById(`jump-${cur}`).classList.add('active');
    }

    function updateJumpUI() {
        if(userAns[cur] !== undefined) document.getElementById(`jump-${cur}`).classList.add('filled');
    }

    function nav(s) {
        let n = cur + s;
        if(n >= 0 && n < session.length) { cur = n; render(); }
    }

    function runTimer() {
        timerId = setInterval(() => {
            if(timeLeft <= 0 || isReview) { clearInterval(timerId); if(timeLeft <= 0) finishExam(); }
            else {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer-display').innerText = `Time: ${m}:${s < 10 ? '0'+s : s}`;
            }
        }, 1000);
    }

    function finishExam() {
        if(!isReview && (timeLeft <= 0 || confirm("Submit Examination? Review mode will follow."))) {
            isReview = true;
            cur = 0;
            document.getElementById('master-submit').style.display = 'none';
            render();
            alert("Examination Submitted!");
        }
    }
</script>
</body>
</html>
