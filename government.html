<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Government CBT</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
  color: #1e3a8a;
}

.option {
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 10px;
  cursor: pointer;
}

.option:hover {
  background: #e0e7ff;
}

.selected {
  background: #2563eb;
  color: white;
}

.progress {
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  margin-bottom: 20px;
}

.progress-bar {
  height: 10px;
  background: #2563eb;
  width: 0%;
  border-radius: 10px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  opacity: 0.9;
}

.review-card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

.correct { color: green; }
.wrong { color: red; }
</style>
</head>

<body>

<div class="container">

  <div id="quizPage">
    <div class="topbar">
      <div id="progressText"></div>
      <div id="timer">Time: 0s</div>
    </div>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="card">
      <h2 id="question"></h2>
      <div id="options"></div>

      <button onclick="prevQuestion()">Previous</button>
      <button onclick="nextQuestion()">Next</button>
    </div>
  </div>

  <div id="resultPage" style="display:none;">
    <div class="card" style="text-align:center;">
      <h2>Your Result</h2>
      <h1 id="score"></h1>
      <p id="performance"></p>

      <button onclick="restart()">Try Again</button>
      <button onclick="showReview()">Review Answers</button>
    </div>
  </div>

  <div id="reviewPage" style="display:none;">
    <h2>Review Answers</h2>
    <div id="reviewContainer"></div>
    <button onclick="goHome()">Home</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "Which system of government operates in Nigeria?",
    options: ["Parliamentary", "Presidential", "Unitary", "Confederal"],
    answer: 1,
    explanation: "Nigeria practices a presidential system."
  },
  {
    q: "Separation of powers was proposed by?",
    options: ["Locke", "Montesquieu", "Rousseau", "Hobbes"],
    answer: 1,
    explanation: "Montesquieu introduced separation of powers."
  },
  {
    q: "The legislature is responsible for?",
    options: ["Executing laws", "Making laws", "Judging laws", "Enforcing laws"],
    answer: 1,
    explanation: "The legislature makes laws."
  },const questions = [
{
q: "Which political system is characterized by the fusion of executive and legislative powers?",
options: ["Presidential", "Federal", "Parliamentary", "Confederal"],
answer: 2,
explanation: "Parliamentary system fuses executive and legislature."
},
{
q: "The concept of rule of law was popularized by?",
options: ["Montesquieu", "A.V. Dicey", "Hobbes", "Locke"],
answer: 1,
explanation: "A.V. Dicey popularized the rule of law."
},
{
q: "In a federal system, powers are divided between?",
options: ["President and judiciary", "Central and regional governments", "Military and civilians", "Legislature and judiciary"],
answer: 1,
explanation: "Federalism divides powers between central and regional governments."
},
{
q: "A constitution that is difficult to amend is called?",
options: ["Written", "Flexible", "Rigid", "Unitary"],
answer: 2,
explanation: "Rigid constitutions are hard to amend."
},
{
q: "Which arm of government interprets the law?",
options: ["Executive", "Legislature", "Judiciary", "Police"],
answer: 2,
explanation: "Judiciary interprets laws."
},
{
q: "The term bicameral legislature means?",
options: ["One chamber", "Two chambers", "Three chambers", "No chamber"],
answer: 1,
explanation: "Bicameral means two legislative houses."
},
{
q: "Nigeria operates which type of legislature?",
options: ["Unicameral", "Bicameral", "Tricameral", "None"],
answer: 1,
explanation: "Nigeria has Senate and House of Representatives."
},
{
q: "Which political ideology supports state ownership?",
options: ["Capitalism", "Socialism", "Democracy", "Feudalism"],
answer: 1,
explanation: "Socialism supports state ownership."
},
{
q: "The executive is responsible for?",
options: ["Making laws", "Executing laws", "Interpreting laws", "Amending laws"],
answer: 1,
explanation: "Executive executes laws."
},
{
q: "Which form of government is ruled by a king or queen?",
options: ["Republic", "Monarchy", "Democracy", "Oligarchy"],
answer: 1,
explanation: "Monarchy is rule by a king or queen."
},
{
q: "The head of government in Nigeria is the?",
options: ["Chief Justice", "President", "Senate President", "Governor"],
answer: 1,
explanation: "President is head of government."
},
{
q: "Which system allows citizens to vote directly on issues?",
options: ["Indirect democracy", "Direct democracy", "Monarchy", "Oligarchy"],
answer: 1,
explanation: "Direct democracy allows direct voting."
},
{
q: "An unwritten constitution is also known as?",
options: ["Rigid", "Flexible", "Codified", "Federal"],
answer: 1,
explanation: "Unwritten constitutions are flexible."
},
{
q: "Which body conducts elections in Nigeria?",
options: ["INEC", "EFCC", "NASS", "ICPC"],
answer: 0,
explanation: "INEC conducts elections."
},
{
q: "The doctrine of separation of powers prevents?",
options: ["Corruption", "Abuse of power", "Elections", "Military rule"],
answer: 1,
explanation: "It prevents abuse of power."
},
{
q: "Which government type is controlled by a few people?",
options: ["Democracy", "Oligarchy", "Republic", "Federal"],
answer: 1,
explanation: "Oligarchy is rule by few."
},
{
q: "The judiciary ensures?",
options: ["Execution", "Justice", "Law making", "Elections"],
answer: 1,
explanation: "Judiciary ensures justice."
},
{
q: "Which constitution introduced presidential system in Nigeria?",
options: ["1960", "1963", "1979", "1999"],
answer: 2,
explanation: "1979 introduced presidential system."
},
{
q: "A sovereign state must have?",
options: ["Army only", "Defined territory", "Only population", "Religion"],
answer: 1,
explanation: "Defined territory is essential."
},
{
q: "Political parties contest elections to?",
options: ["Rule directly", "Win power", "Control judiciary", "Stop laws"],
answer: 1,
explanation: "They aim to win power."
}
  
// Continue similarly...

];

// 👉 ADD UP TO 200 QUESTIONS HERE

let current = 0;
let selectedAnswers = [];
let time = 0;

function loadQuestion() {
  const q = questions[current];
  document.getElementById("question").innerText = `Q${current+1}: ${q.q}`;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((opt, index) => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = opt;

    if (selectedAnswers[current] === index) {
      div.classList.add("selected");
    }

    div.onclick = () => {
      selectedAnswers[current] = index;
      loadQuestion();
    };

    optionsDiv.appendChild(div);
  });

  updateProgress();
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    loadQuestion();
  } else {
    finishQuiz();
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    loadQuestion();
  }
}

function updateProgress() {
  let percent = ((current+1)/questions.length)*100;
  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText =
    `Question ${current+1} of ${questions.length}`;
}

function finishQuiz() {
  let score = 0;

  questions.forEach((q, i) => {
    if (selectedAnswers[i] === q.answer) score++;
  });

  document.getElementById("quizPage").style.display = "none";
  document.getElementById("resultPage").style.display = "block";

  let percent = (score / questions.length) * 100;

  document.getElementById("score").innerText =
    score + " / " + questions.length;

  let performance = "";

  if (percent >= 80) performance = "Excellent 🎉";
  else if (percent >= 50) performance = "Good 👍";
  else performance = "Needs Improvement 📚";

  document.getElementById("performance").innerText =
    performance + " (" + percent.toFixed(1) + "%) | Time: " + time + "s";
}

function showReview() {
  document.getElementById("resultPage").style.display = "none";
  document.getElementById("reviewPage").style.display = "block";

  const container = document.getElementById("reviewContainer");
  container.innerHTML = "";

  questions.forEach((q, i) => {
    let user = selectedAnswers[i];
    let correct = q.answer;

    let div = document.createElement("div");
    div.className = "review-card";

    let status = user === correct ? "correct" : "wrong";

    div.innerHTML = `
      <h4>Q${i+1}: ${q.q}</h4>
      <p class="${status}">Your Answer: ${q.options[user] || "None"}</p>
      <p class="correct">Correct Answer: ${q.options[correct]}</p>
      <p><i>${q.explanation}</i></p>
    `;

    container.appendChild(div);
  });
}

function restart() {
  location.reload();
}

function goHome() {
  window.location.href = "index.html";
}

setInterval(() => {
  time++;
  document.getElementById("timer").innerText = "Time: " + time + "s";
}, 1000);

loadQuestion();
</script>

</body>
    </html>
