
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Portal | STUDY-WITH-MUBARAK</title>
<style>
:root {
    --primary: #2563eb;
    --secondary: #0f172a;
    --accent: #10b981;
    --danger: #ef4444;
    --gold: #f59e0b;
}

body {
    font-family: 'Inter', sans-serif; background: #f1f5f9;
    background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
    margin: 0; color: var(--secondary);
}

header { background: var(--secondary); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--primary); }
.container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

.glass-card {
    background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
    padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-weight: 600; }

.q-meta { display: flex; gap: 10px; margin-bottom: 15px; }
.badge {
    padding: 5px 12px; border-radius: 20px; font-size: 0.75rem;
    font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
}
.badge-topic { background: var(--primary); color: white; }
.badge-year { background: var(--gold); color: var(--secondary); }

#quiz-ui { display: none; }
.q-card {
    background: white; padding: 40px; border-radius: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    border-left: 15px solid var(--primary);
}

.option {
    padding: 15px; border: 2px solid #f1f5f9; border-radius: 12px;
    margin-top: 10px; cursor: pointer; transition: 0.2s;
}
.option:hover:not(.disabled) { border-color: var(--primary); background: #eff6ff; }
.option.selected { border-color: var(--primary); background: #eff6ff; font-weight: 800; }
.option.correct { background: #dcfce7; border-color: var(--accent); color: #166534; }
.option.wrong { background: #fee2e2; border-color: var(--danger); color: #991b1b; }
.option.disabled { cursor: not-allowed; opacity: 0.8; }

.nav-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
.btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-submit { background: var(--accent); color: white; grid-column: span 2; }

.jump-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 30px; }
.jump-box { width: 40px; height: 40px; background: white; border: 2px solid #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.2s; }
.jump-box:hover { border-color: var(--primary); }
.jump-box.active { background: var(--primary); color: white; border-color: var(--primary); }
.jump-box.done { background: #dcfce7; border-color: var(--accent); }

.explanation { background: #f0fdf4; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 4px solid var(--accent); display: none; }

@media(max-width: 600px) {
   .form-grid { grid-template-columns: 1fr; }
   .q-card { padding: 20px; }
}
</style>
</head>
<body>

<header>
    <h1>STUDY-WITH-MUBARAK</h1>
    <p>JAMB & SSCE Professional Exam Engine</p>
</header>

<div class="container">
    <div id="setup-screen" class="glass-card">
        <h2>Exam Configuration</h2>
        <div class="form-grid">
            <div>
                <label>Category</label>
                <select id="exam-cat">
                    <option value="JAMB">JAMB (UTME)</option>
                    <option value="SSCE">SSCE (WAEC/NECO)</option>
                </select>
            </div>
            <div>
                <label>Year</label>
                <select id="exam-year">
                    <option value="all">All Years</option>
                </select>
            </div>
            <div style="grid-column: span 2;">
                <label>Topic focus</label>
                <select id="exam-topic">
                    <option value="all">All Topics Combined</option>
                </select>
            </div>
        </div>
        <button class="btn" style="width:100%; background:var(--primary); color:white; font-size:1.1rem;" onclick="startExam()">Start Examination</button>
    </div>

    <div id="quiz-ui">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;">
            <span id="progress">Question 1</span>
            <span id="timer" style="color:var(--danger);">20:00</span>
        </div>

        <div class="q-card">
            <div class="q-meta">
                <span id="badge-topic" class="badge badge-topic">Topic</span>
                <span id="badge-year" class="badge badge-year">2022</span>
            </div>

            <h3 id="q-text" style="margin-top:0;">Loading Question...</h3>
            <div id="options-box"></div>
            <div id="exp-box" class="explanation"></div>

            <div class="nav-footer">
                <button id="prev-btn" class="btn" style="background:#e2e8f0;" onclick="nav(-1)">Previous</button>
                <button id="next-btn" class="btn" style="background:var(--primary); color:white;" onclick="nav(1)">Next</button>
                <button class="btn btn-submit" onclick="finish()">SUBMIT EXAMINATION</button>
            </div>
        </div>

        <div class="jump-grid" id="jump-grid"></div>
    </div>
</div>

<script>
const questions = [
    {
        q: "The first capital of Nigeria was?",
        a: ["Lagos", "Abuja", "Calabar", "Lokoja"],
        c: 2,
        t: "Pre-Colonial Admin",
        y: 2005,
        type: "JAMB",
        e: "Calabar served as the first capital of the Southern Protectorate and Nigeria."
    },
    {
        q: "Which body conducts the SSCE in West Africa?",
        a: ["NECO", "JAMB", "WAEC", "NABTEB"],
        c: 2,
        t: "Educational Bodies",
        y: 2018,
        type: "SSCE",
        e: "WAEC is responsible for the WASSCE across West African countries."
    }
];

let session = [], cur = 0, answers = {}, isReview = false, timerLeft = 1200, timerInterval = null;

window.onload = () => {
    const yr = document.getElementById('exam-year');
    for(let i=2026; i>=2000; i--) yr.innerHTML += `<option value="${i}">${i}</option>`;

    const topSelect = document.getElementById('exam-topic');
    const uniqueTopics = [...new Set(questions.map(q => q.t.trim()))];
    uniqueTopics.forEach(t => topSelect.innerHTML += `<option value="${t}">${t}</option>`);
};

function startExam() {
    clearInterval(timerInterval);

    const cat = document.getElementById('exam-cat').value;
    const topic = document.getElementById('exam-topic').value;
    const year = document.getElementById('exam-year').value;

    session = questions.filter(q => q.type === cat);
    if(topic!== 'all') session = session.filter(q => q.t.trim() === topic);
    if(year!== 'all') session = session.filter(q => q.y == year);

    if(session.length === 0) return alert("No questions found for this selection!");

    answers = {};
    cur = 0;
    isReview = false;
    timerLeft = 1200;

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('quiz-ui').style.display = 'block';
    buildGrid();
    render();
    startTimer();
}

function buildGrid() {
    const grid = document.getElementById('jump-grid');
    grid.innerHTML = '';
    session.forEach((_, i) => {
        const div = document.createElement('div');
        div.id = `jump-${i}`;
        div.className = 'jump-box';
        div.textContent = i + 1;
        div.onclick = () => jump(i);
        grid.appendChild(div);
    });
}

function updateJumpGrid() {
    session.forEach((_, i) => {
        const box = document.getElementById(`jump-${i}`);
        if(!box) return;
        box.className = 'jump-box';
        if(i === cur) box.classList.add('active');
        if(answers[i]!== undefined) box.classList.add('done');
    });
}

function render() {
    const q = session[cur];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('badge-topic').innerText = q.t;
    document.getElementById('badge-year').innerText = q.y;
    document.getElementById('progress').innerText = `Question ${cur+1} of ${session.length}`;

    document.getElementById('prev-btn').disabled = cur === 0;
    document.getElementById('next-btn').disabled = cur === session.length - 1;

    const box = document.getElementById('options-box');
    box.innerHTML = '';
    q.a.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.setAttribute('role', 'button');
        div.setAttribute('tabindex', '0');

        if(answers[cur] === i) div.classList.add('selected');
        if(isReview) {
            div.classList.add('disabled');
            if(i === q.c) div.classList.add('correct');
            else if(answers[cur] === i) div.classList.add('wrong');
            div.innerText = (i === q.c? "✓ " : (answers[cur] === i? "✗ " : "")) + opt;
        } else {
            div.innerText = opt;
            div.onclick = () => selectOption(i);
        }
        box.appendChild(div);
    });

    const eb = document.getElementById('exp-box');
    if(isReview) {
        eb.style.display = 'block';
        eb.innerHTML = `<strong>Explanation:</strong> ${q.e}`;
    } else {
        eb.style.display = 'none';
    }

    updateJumpGrid();
}

function selectOption(i) {
    if(isReview) return;
    answers[cur] = i;
    render();
}

function nav(s) {
    if(cur + s >= 0 && cur + s < session.length) {
        cur += s;
        render();
    }
}

function jump(i) {
    cur = i;
    render();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function startTimer() {
    clearInterval(timerInterval);
    updateTimerDisplay();
    timerInterval = setInterval(() => {
        if(timerLeft > 0 &&!isReview) {
            timerLeft--;
            updateTimerDisplay();
        }
        if(timerLeft === 0 &&!isReview) {
            finish();
        }
    }, 1000);
}

function updateTimerDisplay() {
    let m = Math.floor(timerLeft / 60);
    let s = timerLeft % 60;
    document.getElementById('timer').innerText =
        `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
}

function finish() {
    clearInterval(timerInterval);
    const answered = Object.keys(answers).length;
    if(!isReview && answered < session.length) {
        if(!confirm(`You have answered ${answered} of ${session.length} questions. Submit anyway?`)) {
            return;
        }
    }
    isReview = true;
    cur = 0;
    render();
}
</script>
</body>
</html>
