<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Suite | Study With Mubarak</title>
    <style>
        :root {
            --bg: #091118;
            --surface: rgba(17, 27, 34, 0.7);
            --border: rgba(59, 130, 246, 0.2);
            --text-main: #f0fdfa;
            --text-muted: #93c5fd;
            --primary: #3b82f6;
            --blur: blur(16px);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        body { margin: 0; padding: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; }
        .navbar { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); backdrop-filter: var(--blur); position: sticky; top: 0; z-index: 100; }
        .back-btn { color: var(--primary); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .container { max-width: 850px; margin: 30px auto; padding: 0 24px; }
        .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 36px; box-shadow: var(--shadow); backdrop-filter: var(--blur); margin-bottom: 24px; }
        input, select { background: #050a0e; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 1rem; margin-bottom: 12px; width: 100%; box-sizing: border-box; }
        button { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; width: 100%; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="back-btn">➔ Back to Hub</a>
    <div style="font-weight: 800; text-transform: uppercase;">🔋 Advanced Physics Station</div>
</div>

<div class="container">
    <div class="quiz-card">
        <h2 style="margin-top:0; color: var(--primary);">Resistor Network Array Matrix Solver</h2>
        <p style="color: var(--text-muted);">Enter ohms magnitudes separated explicitly by commas (e.g., <b>10, 20, 30</b>):</p>
        <input type="text" id="resistorInputs" placeholder="e.g. 10, 20, 30" value="10, 20">
        <select id="circuitType">
            <option value="series">Series Layout Configuration</option>
            <option value="parallel">Parallel Layout Configuration</option>
        </select>
        <button onclick="calculateCircuit()">Compute Network Vector</button>
        <h3 id="circuitResult" style="color: #60a5fa; margin-top:20px; text-align:center;"></h3>
    </div>

    <div class="quiz-card">
        <h2 style="margin-top:0;">Syllabus Question Array Preview</h2>
        <div id="questionsContainer"></div>
    </div>
</div>

<script>
    const physicsRepo = [
        { topic: "AC Circuits", q: "An alternating current circuit displays maximum resonance performance parameters when the phase angle between voltage and current yields which vector value?", o: ["0 Degrees", "45 Degrees", "90 Degrees", "180 Degrees"] }
    ];

    document.getElementById('questionsContainer').innerHTML = physicsRepo.map((q, idx) => `
        <div style="margin-bottom: 24px; border-left: 4px solid var(--primary); padding-left: 16px;">
            <div style="font-size:0.85rem; font-weight:800; color:var(--primary); text-transform:uppercase;">${q.topic}</div>
            <div style="font-size:1.1rem; margin: 8px 0; font-weight:700;">Q${idx+1}: ${q.q}</div>
            <div style="display:grid; gap:8px; color: var(--text-muted);">
                ${q.o.map(opt => `<div style="background:#0e1a24; padding:10px; border-radius:6px;">○ ${opt}</div>`).join('')}
            </div>
        </div>
    `).join('');

    function calculateCircuit() {
        let values = document.getElementById('resistorInputs').value.split(',').map(Number).filter(v => !isNaN(v) && v > 0);
        let type = document.getElementById('circuitType').value;
        if(values.length === 0) return alert("Please specify numeric vector inputs.");

        let target = document.getElementById('circuitResult');
        if(type === "series") {
            let sum = values.reduce((a, b) => a + b, 0);
            target.innerText = `Total Network Resistance ($R_{eq}$) = ${sum.toFixed(2)} Ω`;
        } else {
            let invSum = values.reduce((a, b) => a + (1 / b), 0);
            target.innerText = `Total Network Resistance ($R_{eq}$) = ${(1 / invSum).toFixed(2)} Ω`;
        }
    }
</script>
</body>
</html>
