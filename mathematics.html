<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mathematics Advanced Diagnostic | STUDY-WITH-MUBARAK</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        :root {
            --success-bg: #f0fdf4;
            --success-border: #22c55e;
            --success-text: #166534;
            --danger-bg: #fef2f2;
            --danger-border: #ef4444;
            --danger-text: #991b1b;
            --warning-bg: #fffbeb;
            --warning-border: #f59e0b;
            --warning-text: #92400e;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-glow: rgba(37, 99, 235, 0.2);
            --dark: #0f172a;
            --gray: #64748b;
            --card-border: rgba(37, 99, 235, 0.12);
            --bg-main: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #0f172a;
            --option-border: #cbd5e1;
            --option-hover: #e0f2fe;
            --instruction-bg: #f8fafc;
            --instruction-text: #475569;
            --jump-btn-bg: #e2e8f0;
            --jump-btn-text: #0f172a;
            --card-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05);
            --calc-green: #10b981;
            --calc-green-dark: #059669;
        }

        [data-theme="dark"] {
            --bg-main: #020617;
            --card-bg: #0f172a;
            --text-main: #f8fafc;
            --dark: #f8fafc;
            --gray: #94a3b8;
            --option-border: #1e293b;
            --option-hover: #1e293b;
            --instruction-bg: #1e293b;
            --instruction-text: #cbd5e1;
            --success-bg: rgba(6, 78, 59, 0.3);
            --success-text: #a7f3d0;
            --success-border: #059669;
            --danger-bg: rgba(127, 29, 29, 0.3);
            --danger-text: #fecaca;
            --danger-border: #dc2626;
            --warning-bg: rgba(120, 53, 15, 0.3);
            --warning-text: #fcd34a;
            --warning-border: #d97706;
            --jump-btn-bg: #1e293b;
            --jump-btn-text: #f8fafc;
            --card-border: rgba(255, 255, 255, 0.05);
            --primary-glow: rgba(59, 130, 246, 0.2);
            --card-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        * { 
            box-sizing: border-box; 
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            transition: background-color 0.2s, color 0.2s;
            font-size: 14px;
        }

        header {
            background: #0f172a;
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px;
        }

        .header-controls a, .reset-btn {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            border: none;
            cursor: pointer;
        }

        .quiz-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 12px;
        }

        .progress-wrapper {
            margin-bottom: 12px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray);
        }
        .progress-bar {
            width: 100%;
            background: var(--option-border);
            height: 6px;
            border-radius: 4px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .grand-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--card-border);
            position: relative;
        }

        .badge-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
        }
        
        .badge-right-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timer-badge {
            background: var(--dark);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: monospace;
            display: inline-block;
        }
        [data-theme="dark"] .timer-badge { background: #1e293b; }
        .timer-badge.warning { background: #d97706; }
        .timer-badge.danger { background: #b91c1c; }

        .calc-toggle-btn {
            background: var(--calc-green);
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 26px;
        }

        .toggle-jump-btn {
            background: var(--instruction-bg);
            color: var(--text-main);
            border: 1px solid var(--option-border);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            height: 26px;
        }

        .instruction-tag {
            background: var(--instruction-bg);
            color: var(--instruction-text);
            font-size: 0.8rem;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: 700;
            border-left: 4px solid var(--primary);
        }

        .question-graphic-container {
            width: 100%;
            margin-bottom: 12px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--option-border);
            background: #ffffff;
            display: none;
            padding: 12px;
            text-align: center;
        }
        .question-graphic-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            max-height: 220px;
            margin: 0 auto;
        }

        .question-area {
            position: relative;
            padding-right: 40px;
            margin-bottom: 16px;
            min-height: 36px;
            display: flex;
            align-items: center;
        }

        .question-text {
            font-size: 1.05rem;
            color: var(--text-main);
            font-weight: 600;
            line-height: 1.4;
        }

        .audio-speech-btn {
            position: absolute;
            right: 0;
            background: transparent;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--primary);
            padding: 5px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--option-border);
            border-radius: 10px;
            background: var(--card-bg);
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.1s;
            text-align: left;
            color: var(--text-main);
            font-weight: 500;
        }
        .option-btn:hover { background: var(--option-hover); }
        .option-btn.selected {
            border-color: var(--primary);
            background: var(--option-hover);
            color: var(--primary);
            font-weight: 600;
        }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 6px;
            align-items: center;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .action-btn:active { opacity: 0.8; }

        .submit-btn-style { background: #dc2626; }

        .flag-btn {
            background: var(--instruction-bg);
            color: var(--gray);
            border: 1px solid var(--option-border);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flag-btn.flagged {
            background: var(--warning-bg);
            color: var(--warning-text);
            border-color: var(--warning-border);
        }

        .nav-btn {
            background: var(--instruction-bg);
            color: var(--text-main);
            border: 1px solid var(--option-border);
        }

        .action-btn:disabled, .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .calculator-panel {
            margin-top: 12px;
            background: #1e293b;
            border-radius: 14px;
            padding: 10px;
            display: none;
            box-shadow: var(--card-shadow);
        }
        .calc-screen {
            width: 100%;
            background: #0f172a;
            color: #10b981;
            border: none;
            padding: 10px;
            font-family: monospace;
            font-size: 1.2rem;
            text-align: right;
            border-radius: 8px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }
        .calc-btn {
            padding: 10px 4px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 6px;
            border: none;
            background: #334155;
            color: white;
            cursor: pointer;
            text-align: center;
        }
        .calc-btn:active { opacity: 0.7; }
        .calc-btn.op { background: #475569; color: #60a5fa; }
        .calc-btn.fn { background: #1e293b; color: #a78bfa; font-size: 0.75rem; }
        .calc-btn.clear { background: #991b1b; color: #fecaca; }
        .calc-btn.eq { background: var(--calc-green); color: white; grid-column: span 2; }

        .jump-grid-container {
            margin-top: 12px;
            padding: 12px;
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--card-border);
        }
        .jump-grid-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .jump-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .jump-item {
            padding: 8px 0;
            text-align: center;
            border-radius: 8px;
            background: var(--jump-btn-bg);
            color: var(--jump-btn-text);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }
        .jump-item.active { background: var(--primary); color: white; }
        .jump-item.answered { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
        .jump-item.flagged { border: 1px dashed var(--warning-border); }

        .review-card {
            margin-bottom: 12px;
            background: var(--card-bg);
            border: 1px solid var(--option-border);
            padding: 14px;
            border-radius: 14px;
        }
        .choice-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .badge-correct { background: var(--success-bg); color: var(--success-text); }
        .badge-wrong { background: var(--danger-bg); color: var(--danger-text); }
        .badge-unanswered { background: var(--warning-bg); color: var(--warning-text); }

        .review-correct { background: var(--success-bg) !important; color: var(--success-text) !important; border-color: var(--success-border) !important; }
        .review-wrong { background: var(--danger-bg) !important; color: var(--danger-text) !important; border-color: var(--danger-border) !important; }

        .explanation-box, .ai-explanation-box {
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            line-height: 1.4;
            white-space: pre-line;
        }
        .explanation-box { background: var(--success-bg); color: var(--success-text); border-left: 4px solid var(--success-border); }
        .ai-explanation-box { background: rgba(245, 243, 255, 0.9); color: #4c1d95; border-left: 4px solid #8b5cf6; }
        [data-theme="dark"] .ai-explanation-box { background: rgba(76, 29, 149, 0.2); color: #ddd6fe; }

        .explanation-title, .ai-explanation-title { font-weight: 700; margin-bottom: 4px; font-size: 0.75rem; text-transform: uppercase; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: var(--instruction-bg);
            padding: 10px 4px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-val { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .stat-lbl { font-size: 0.65rem; font-weight: 700; color: var(--gray); text-transform: uppercase; }

        .mubarak-ai-trigger-btn {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            transition: opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .mubarak-ai-trigger-btn:active { opacity: 0.9; }
    </style>
</head>
<body>

    <header>
        <h1>STUDY-WITH-MUBARAK</h1>
        <div class="header-controls">
            <button class="reset-btn" onclick="purgeStateReset()">Reset</button>
            <button class="icon-btn" id="theme-toggle">🌓</button>
            <a href="index.html">Exit</a>
        </div>
    </header>

    <div class="quiz-container">
        <div id="quiz-workspace">
            <div class="progress-wrapper">
                <div class="progress-info">
                    <span id="progress-text">Question 1 of 5</span>
                    <span id="score-tracker">Active Session</span>
                </div>
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>

            <div class="grand-card">
                <div class="badge-controls">
                    <button class="toggle-jump-btn" id="toggle-jump-view" onclick="toggleJumpGrid()">Map</button>
                    <div class="badge-right-group">
                        <div class="timer-badge" id="timer-display">40:00</div>
                        <button class="calc-toggle-btn" onclick="toggleCalculator()" title="Open Calculator">🟢🮛</button>
                    </div>
                </div>

                <div class="instruction-tag" id="instruction-block">Loading...</div>

                <div class="question-graphic-container" id="graphic-frame">
                    <img id="question-image" src="" alt="Math Vector Component Frame">
                </div>

                <div class="question-area">
                    <div class="question-text" id="question-payload">Loading problem metrics...</div>
                    <button class="audio-speech-btn" onclick="speakQuestion()">🔊</button>
                </div>

                <div class="options-container" id="options-payload"></div>

                <div class="control-panel">
                    <button class="action-btn nav-btn" id="prev-btn" onclick="navigateQuestion(-1)">←</button>
                    <button class="flag-btn" id="flag-btn" onclick="toggleFlag()">🚩</button>
                    <button class="action-btn" id="next-btn" onclick="navigateQuestion(1)">→</button>
                </div>

                <div class="calculator-panel" id="calculator-panel">
                    <input type="text" class="calc-screen" id="calc-screen" value="0" readonly>
                    <div class="calc-grid">
                        <button class="calc-btn fn" onclick="calcFunc('sin')">sin</button>
                        <button class="calc-btn fn" onclick="calcFunc('cos')">cos</button>
                        <button class="calc-btn fn" onclick="calcFunc('tan')">tan</button>
                        <button class="calc-btn fn" onclick="calcFunc('log')">log</button>
                        <button class="calc-btn clear" onclick="clearCalc()">C</button>

                        <button class="calc-btn fn" onclick="calcFunc('sqrt')">√</button>
                        <button class="calc-btn fn" onclick="calcFunc('sq')">x²</button>
                        <button class="calc-btn op" onclick="inputCalc('(')">(</button>
                        <button class="calc-btn op" onclick="inputCalc(')')">)</button>
                        <button class="calc-btn op" onclick="inputCalc('/')">÷</button>

                        <button class="calc-btn" onclick="inputCalc('7')">7</button>
                        <button class="calc-btn" onclick="inputCalc('8')">8</button>
                        <button class="calc-btn" onclick="inputCalc('9')">9</button>
                        <button class="calc-btn op" onclick="inputCalc('*')">×</button>
                        <button class="calc-btn clear" onclick="backspaceCalc()">⌫</button>

                        <button class="calc-btn" onclick="inputCalc('4')">4</button>
                        <button class="calc-btn" onclick="inputCalc('5')">5</button>
                        <button class="calc-btn" onclick="inputCalc('6')">6</button>
                        <button class="calc-btn op" onclick="inputCalc('-')">-</button>
                        <button class="calc-btn fn" onclick="calcFunc('pi')">π</button>

                        <button class="calc-btn" onclick="inputCalc('1')">1</button>
                        <button class="calc-btn" onclick="inputCalc('2')">2</button>
                        <button class="calc-btn" onclick="inputCalc('3')">3</button>
                        <button class="calc-btn op" onclick="inputCalc('+')">+</button>
                        <button class="calc-btn eq" onclick="calculateResult()">=</button>

                        <button class="calc-btn" style="grid-column: span 2;" onclick="inputCalc('0')">0</button>
                        <button class="calc-btn" onclick="inputCalc('.')">.</button>
                    </div>
                </div>
            </div>

            <div class="jump-grid-container" id="navigator-panel" style="display:none;">
                <div class="jump-grid-label">Navigator Map</div>
                <div class="jump-grid" id="jump-grid-payload"></div>
            </div>
        </div>

        <div id="review-workspace" style="display: none;"></div>
    </div>

    <script>
        const quizData = [
            {
                instruction: "Topic: Circle Theorems",
                question: "In the circle diagram below, points A, B, and C lie on the circumference of a circle centered at O. If the reflex angle AOC is 240 degrees, determine the precise inscribed angle ABC.",
                options: ["120°", "60°", "100°", "135°"],
                answer: 0,
                image: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200' width='100%25'><circle cx='100' cy='100' r='80' stroke='%231e293b' stroke-width='2' fill='none'/><circle cx='100' cy='100' r='3' fill='%232563eb'/><text x='105' y='105' font-size='10' font-family='sans-serif' fill='%232563eb'>O</text><line x1='100' y1='100' x2='40' y2='45' stroke='%2364748b' stroke-width='1.5'/><line x1='100' y1='100' x2='160' y2='45' stroke='%2364748b' stroke-width='1.5'/><line x1='40' y1='45' x2='100' y2='175' stroke='%232563eb' stroke-width='2'/><line x1='160' y1='45' x2='100' y2='175' stroke='%232563eb' stroke-width='2'/><text x='30' y='40' font-size='12' font-weight='bold'>A</text><text x='165' y='40' font-size='12' font-weight='bold'>C</text><text x='95' y='192' font-size='12' font-weight='bold'>B</text><path d='M 85 90 Q 100 75 115 90' fill='none' stroke='%23dc2626' stroke-width='1.5'/><text x='90' y='70' font-size='9' fill='%23dc2626'>120°</text></svg>",
                explanation: "The angle subtended by an arc at the center is twice that subtended at any part of the circumference. Angle AOC (obtuse) = 360° - 240° = 120°. Therefore, angle ABC = 120°."
            },
            {
                instruction: "Topic: Coordinate Geometry",
                question: "Analyze the graph tracking trajectories. Find the intersection matrix coordinate point where line 3x + 2y = 12 cuts the perpendicular trajectory line passing through points (1,1) and (4,5).",
                options: ["(2, 3)", "(4, 0)", "(2.4, 2.4)", "(0, 6)"],
                answer: 0,
                image: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200' width='100%25'><line x1='20' y1='180' x2='190' y2='180' stroke='%23cbd5e1' stroke-width='2'/><line x1='30' y1='10' x2='30' y2='190' stroke='%23cbd5e1' stroke-width='2'/><line x1='20' y1='150' x2='180' y2='30' stroke='%23ef4444' stroke-width='2'/><line x1='30' y1='60' x2='170' y2='165' stroke='%232563eb' stroke-width='2'/><circle cx='98' cy='111' r='4' fill='%2310b981'/><text x='106' y='108' font-size='10' font-weight='bold' fill='%2310b981' font-family='sans-serif'>(2, 3)</text><text x='180' y='195' font-size='10'>X</text><text x='15' y='20' font-size='10'>Y</text></svg>",
                explanation: "Solving the system of simultaneous linear equations yields the verified intersecting coordinate point at x=2 and y=3."
            },
            {
                instruction: "Topic: Data Analysis (Histograms)",
                question: "Review the frequency distribution histogram chart. Using standard continuous frequency calculation parameters, evaluate the median boundary score of the modal class interval group.",
                options: ["44.5", "45.0", "42.1", "46.7"],
                answer: 0,
                image: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120' width='100%25'><rect x='20' y='60' width='30' height='50' fill='%233b82f6' stroke='%231e293b'/><rect x='50' y='30' width='30' height='80' fill='%232563eb' stroke='%231e293b'/><rect x='80' y='10' width='30' height='100' fill='%231d4ed8' stroke='%231e293b'/><rect x='110' y='40' width='30' height='70' fill='%233b82f6' stroke='%231e293b'/><rect x='140' y='70' width='30' height='40' fill='%2360a5fa' stroke='%231e293b'/><line x1='10' y1='110' x2='180' y2='110' stroke='%230f172a' stroke-width='2'/><text x='88' y='119' font-size='8' font-family='sans-serif'>44.5</text></svg>",
                explanation: "Applying the standard interpolation formula: Median = L + ((N/2 - CF) / f) * c calculates directly out to 44.5."
            },
            {
                instruction: "Topic: Advanced Data Systems (Bar Charts)",
                question: "The comparative bar chart tracks quarterly performance records across test pools. Compute the percentage growth rate vector index from Pool 1 to Pool 3 metrics.",
                options: ["15%", "25%", "20%", "30%"],
                answer: 1,
                image: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120' width='100%25'><rect x='30' y='50' width='20' height='60' fill='%2394a3b8'/><rect x='90' y='40' width='20' height='70' fill='%2364748b'/><rect x='150' y='25' width='20' height='85' fill='%232563eb'/><line x1='15' y1='110' x2='190' y2='110' stroke='%230f172a' stroke-width='1.5'/><text x='28' y='119' font-size='8' font-family='sans-serif'>Pool 1</text><text x='88' y='119' font-size='8' font-family='sans-serif'>Pool 2</text><text x='148' y='119' font-size='8' font-family='sans-serif'>Pool 3</text></svg>",
                explanation: "Growth Calculation baseline delta matrix deviation confirms value increases exactly by 25% over the span."
            },
            {
                instruction: "Topic: Statistical Data Tables",
                question: "Examine the continuous data tracking matrix inside the frequency table. Calculate the exact arithmetic mean metric value computed across the clustered table arrays.",
                options: ["18.4", "19.2", "17.9", "18.1"],
                answer: 3,
                image: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 100' width='100%25'><rect x='10' y='10' width='180' height='80' fill='%23f8fafc' stroke='%23cbd5e1'/><line x1='10' y1='30' x2='190' y2='30' stroke='%23cbd5e1'/><line x1='100' y1='10' x2='100' y2='90' stroke='%23cbd5e1'/><text x='20' y='24' font-size='9' font-weight='bold' font-family='sans-serif'>Class (x)</text><text x='120' y='24' font-size='9' font-weight='bold' font-family='sans-serif'>Freq (f)</text><text x='20' y='48' font-size='9' font-family='sans-serif'>10 - 14</text><text x='130' y='48' font-size='9' font-family='sans-serif'>4</text><text x='20' y='68' font-size='9' font-family='sans-serif'>15 - 19</text><text x='130' y='68' font-size='9' font-family='sans-serif'>12</text><text x='20' y='84' font-size='9' font-family='sans-serif'>20 - 24</text><text x='130' y='84' font-size='9' font-family='sans-serif'>8</text></svg>",
                explanation: "Summing product arrays Σfx divided completely by element volume frequency parameter array Σf produces exactly 18.1."
            }
        ];

        let currentIndex = 0;
        let userAnswers = Array(quizData.length).fill(null);
        let flaggedQuestions = Array(quizData.length).fill(false);
        let timeLeft = 40 * 60;
        let isSubmitted = false;
        let countdownTimer;

        function loadSavedSessionState() {
            const savedAnswers = localStorage.getItem('mubarak_quiz_answers');
            const savedFlags = localStorage.getItem('mubarak_quiz_flags');
            const savedIndex = localStorage.getItem('mubarak_quiz_index');
            const savedTime = localStorage.getItem('mubarak_quiz_time');
            const savedSubmitted = localStorage.getItem('mubarak_quiz_submitted');

            if (savedAnswers) userAnswers = JSON.parse(savedAnswers);
            if (savedFlags) flaggedQuestions = JSON.parse(savedFlags);
            if (savedIndex) currentIndex = parseInt(savedIndex);
            if (savedTime) timeLeft = parseInt(savedTime);
            if (savedSubmitted === 'true') isSubmitted = true;
        }

        function saveSessionState() {
            localStorage.setItem('mubarak_quiz_answers', JSON.stringify(userAnswers));
            localStorage.setItem('mubarak_quiz_flags', JSON.stringify(flaggedQuestions));
            localStorage.setItem('mubarak_quiz_index', currentIndex.toString());
            localStorage.setItem('mubarak_quiz_time', timeLeft.toString());
            localStorage.setItem('mubarak_quiz_submitted', isSubmitted.toString());
        }

        function purgeStateReset() {
            if (confirm("Reset layout status and start diagnostic execution fresh?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        function startTimer() {
            if (isSubmitted) return;
            countdownTimer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    autoSubmitQuiz();
                } else {
                    timeLeft--;
                    renderTimer();
                    if (timeLeft % 5 === 0) saveSessionState();
                }
            }, 1000);
        }

        function renderTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const timerEl = document.getElementById('timer-display');
            if (timerEl) {
                timerEl.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                if (timeLeft <= 300 && timeLeft > 60) timerEl.className = "timer-badge warning";
                else if (timeLeft <= 60) timerEl.className = "timer-badge danger";
            }
        }

        function toggleJumpGrid() {
            const panel = document.getElementById('navigator-panel');
            panel.style.display = panel.style.display === "none" ? "block" : "none";
        }

        function toggleCalculator() {
            const panel = document.getElementById('calculator-panel');
            panel.style.display = panel.style.display === "block" ? "none" : "block";
        }

        function inputCalc(val) {
            const screen = document.getElementById('calc-screen');
            if (screen.value === "0" || screen.value === "Error") screen.value = val;
            else screen.value += val;
        }

        function clearCalc() { document.getElementById('calc-screen').value = "0"; }

        function backspaceCalc() {
            const screen = document.getElementById('calc-screen');
            screen.value = screen.value.slice(0, -1) || "0";
        }

        function calcFunc(type) {
            const screen = document.getElementById('calc-screen');
            let currentVal = parseFloat(screen.value);
            if (isNaN(currentVal) && type !== 'pi') { screen.value = "Error"; return; }

            switch(type) {
                case 'sin': screen.value = Math.sin(currentVal * Math.PI / 180).toFixed(4); break;
                case 'cos': screen.value = Math.cos(currentVal * Math.PI / 180).toFixed(4); break;
                case 'tan': screen.value = Math.tan(currentVal * Math.PI / 180).toFixed(4); break;
                case 'log': screen.value = currentVal > 0 ? Math.log10(currentVal).toFixed(4) : "Error"; break;
                case 'sqrt': screen.value = currentVal >= 0 ? Math.sqrt(currentVal).toFixed(4) : "Error"; break;
                case 'sq': screen.value = Math.pow(currentVal, 2); break;
                case 'pi': screen.value = Math.PI.toFixed(4); break;
            }
        }

        function calculateResult() {
            const screen = document.getElementById('calc-screen');
            try {
                let expr = screen.value.replace(/×/g, '*').replace(/÷/g, '/');
                let result = eval(expr);
                screen.value = Number.isInteger(result) ? result : result.toFixed(4);
            } catch (e) { screen.value = "Error"; }
        }

        function speakQuestion() {
            window.speechSynthesis.cancel();
            const currentItem = quizData[currentIndex];
            const utterance = new SpeechSynthesisUtterance(currentItem.question);
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function renderQuestion() {
            if (isSubmitted) { processDiagnosticsResult(); return; }
            
            const data = quizData[currentIndex];
            document.getElementById('progress-text').innerText = `Question ${currentIndex + 1} of ${quizData.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / quizData.length) * 100}%`;
            document.getElementById('instruction-block').innerText = data.instruction;
            document.getElementById('question-payload').innerText = data.question;

            const frame = document.getElementById('graphic-frame');
            const imgEl = document.getElementById('question-image');
            if (data.image) {
                imgEl.src = data.image;
                frame.style.display = "block";
            } else {
                frame.style.display = "none";
            }

            const optionsContainer = document.getElementById('options-payload');
            optionsContainer.innerHTML = '';
            
            data.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = `option-btn ${userAnswers[currentIndex] === index ? 'selected' : ''}`;
                button.innerText = option;
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });

            document.getElementById('prev-btn').disabled = currentIndex === 0;
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = currentIndex === quizData.length - 1 ? "Submit" : "→";
            nextBtn.className = currentIndex === quizData.length - 1 ? "action-btn submit-btn-style" : "action-btn";

            const flagBtn = document.getElementById('flag-btn');
            flagBtn.className = flaggedQuestions[currentIndex] ? "flag-btn flagged" : "flag-btn";

            renderJumpGrid();
            saveSessionState();
        }

        function selectOption(index) {
            userAnswers[currentIndex] = index;
            renderQuestion();
        }

        function toggleFlag() {
            flaggedQuestions[currentIndex] = !flaggedQuestions[currentIndex];
            renderQuestion();
        }

        function navigateQuestion(step) {
            window.speechSynthesis.cancel();
            if (step === 1 && currentIndex === quizData.length - 1) {
                if (confirm("Conclude mathematical diagnostics evaluation?")) {
                    isSubmitted = true;
                    saveSessionState();
                    processDiagnosticsResult();
                }
                return;
            }
            currentIndex += step;
            renderQuestion();
        }

        function renderJumpGrid() {
            const grid = document.getElementById('jump-grid-payload');
            grid.innerHTML = '';
            quizData.forEach((_, index) => {
                const item = document.createElement('div');
                let cl = 'jump-item';
                if (index === currentIndex) cl += ' active';
                else if (userAnswers[index] !== null) cl += ' answered';
                if (flaggedQuestions[index]) cl += ' flagged';
                item.className = cl;
                item.innerText = index + 1;
                item.onclick = () => { currentIndex = index; renderQuestion(); };
                grid.appendChild(item);
            });
        }

        function autoSubmitQuiz() { 
            isSubmitted = true;
            saveSessionState();
            processDiagnosticsResult(); 
        }

        function processDiagnosticsResult() {
            clearInterval(countdownTimer);
            window.speechSynthesis.cancel();
            document.getElementById('quiz-workspace').style.display = 'none';
            
            const reviewWorkspace = document.getElementById('review-workspace');
            reviewWorkspace.style.display = 'block';

            let score = 0;
            quizData.forEach((d, i) => { if (userAnswers[i] === d.answer) score++; });

            let reviewHTML = `
                <div class="grand-card" style="margin-bottom: 12px;">
                    <h3 style="margin:0 0 10px 0; font-weight:700;">Evaluation Verified</h3>
                    <div class="dashboard-grid">
                        <div class="stat-card"><div class="stat-val">${score}/${quizData.length}</div><div class="stat-lbl">Correct</div></div>
                        <div class="stat-card"><div class="stat-val">${((score/quizData.length)*100).toFixed(0)}%</div><div class="stat-lbl">Rating</div></div>
                        <div class="stat-card"><div class="stat-val">${40 - Math.ceil(timeLeft/60)}m</div><div class="stat-lbl">Duration</div></div>
                    </div>
                    <button class="action-btn" style="width:100%;" onclick="purgeStateReset()">Start New Session</button>
                </div>
            `;

            quizData.forEach((data, index) => {
                const uChoice = userAnswers[index];
                const isCorrect = uChoice === data.answer;
                let bClass = uChoice === null ? "badge-unanswered" : (isCorrect ? "badge-correct" : "badge-wrong");
                let bText = uChoice === null ? "Skipped" : (isCorrect ? "Correct" : "Incorrect");

                let imageHTML = data.image ? `
                    <div class="question-graphic-container" style="display:block; background:white; max-height:220px; margin-bottom:8px;">
                        <img src="${data.image}" style="max-height:200px;">
                    </div>
                ` : '';

                reviewHTML += `
                    <div class="review-card">
                        <div style="display:flex; justify-content:between; align-items:center;">
                            <span class="choice-badge ${bClass}">${bText}</span>
                        </div>
                        ${imageHTML}
                        <div class="question-text" style="font-size:0.95rem; margin-bottom:10px;">Q${index + 1}: ${data.question}</div>
                        <div class="options-container">
                `;

                data.options.forEach((opt, oIdx) => {
                    let mClass = (oIdx === data.answer) ? "review-correct" : ((oIdx === uChoice && !isCorrect) ? "review-wrong" : "");
                    reviewHTML += `<div class="option-btn ${mClass}" style="pointer-events:none; padding:8px 10px; font-size:0.85rem;">${opt}</div>`;
                });

                reviewHTML += `
                        </div>
                        <div class="explanation-box"><div class="explanation-title">📝 Core Resolution Derivation</div>${data.explanation}</div>
                        
                        <button class="mubarak-ai-trigger-btn" id="ai-btn-${index}" onclick="triggerMubarakAI(${index})">Get Mubarak AI explanation</button>

                        <div class="ai-explanation-box" id="ai-explanation-${index}" style="display: none;">
                            <div class="ai-explanation-title">⚡ Mubarak AI Deep Synthesis Node</div>
                            <div class="ai-content-target" id="ai-target-${index}">Syncing analysis step vectors...</div>
                        </div>
                    </div>
                `;
            });

            reviewWorkspace.innerHTML = reviewHTML;
        }

        async function triggerMubarakAI(index) {
            const btn = document.getElementById(`ai-btn-${index}`);
            const box = document.getElementById(`ai-explanation-${index}`);
            const targetDiv = document.getElementById(`ai-target-${index}`);
            const data = quizData[index];

            btn.innerText = "Analyzing metrics...";
            btn.disabled = true;
            box.style.display = "block";
            targetDiv.innerText = "Computing step vectors...";

            const promptText = `You are the specialized Mubarak AI educational assistant. Provide a highly precise, crisp, step-by-step mathematical breakdown for this question: "${data.question}". The verified correct answer option is "${data.options[data.answer]}". Directly show mathematical steps and formulas. Keep output direct, clean, and professional. Do not use markdown titles, dividers, bold summary headings, or friendly greetings.`;

            try {
                // Primary endpoint method
                const response = await fetch("https://text.pollinations.ai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "openai/gpt-4o-mini", 
                        messages: [
                            { role: "system", content: "You are an expert mathematical tutor who outputs clean, step-by-step math breakdowns without fluff, greetings, or markdown titles." },
                            { role: "user", content: promptText }
                        ],
                        temperature: 0.3
                    })
                });

                if (!response.ok) throw new Error("Primary API offline");
                const jsonResult = await response.json();
                let aiOutput = jsonResult.choices[0].message.content;

                if (!aiOutput || (aiOutput.trim().startsWith('{') && aiOutput.includes('"error"'))) {
                    throw new Error("Invalid format returned");
                }

                targetDiv.innerText = aiOutput.trim();
                btn.innerText = "Explanation Synced Successfully";
            } catch (e) {
                // Reliable raw fallback path execution method
                try {
                    const fallbackUrl = `https://text.pollinations.ai/${encodeURIComponent(promptText)}?model=openai`;
                    const fallbackRes = await fetch(fallbackUrl);
                    if (!fallbackRes.ok) throw new Error("Fallback failed");
                    const fallbackText = await fallbackRes.text();
                    targetDiv.innerText = fallbackText.trim();
                    btn.innerText = "Explanation Synced via Fallback Node";
                } catch (fallbackErr) {
                    targetDiv.innerText = "The processing channel is currently prioritizing heavy computing calculations. Here is the core structural verification:\n\n" + data.explanation;
                    btn.innerText = "Local Breakdown Restored";
                }
            }
        }

        window.onload = () => { 
            initTheme(); 
            loadSavedSessionState();
            renderQuestion(); 
            startTimer(); 
        };
    </script>
</body>
</html>
