<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mathematics Diagnostic | STUDY-WITH-MUBARAK</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        :root {
            --success-bg: #f0fdf4;
            --success-border: #22c55e;
            --success-text: #166534;
            --danger-bg: #fef2f2;
            --danger-border: #ef4444;
            --danger-text: #991b1b;
            --warning-bg: #fffbeb;
            --warning-border: #f59e0b;
            --warning-text: #92400e;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-glow: rgba(37, 99, 235, 0.2);
            --dark: #0f172a;
            --gray: #64748b;
            --card-border: rgba(37, 99, 235, 0.12);
            --bg-main: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #0f172a;
            --option-border: #cbd5e1;
            --option-hover: #e0f2fe;
            --instruction-bg: #f8fafc;
            --instruction-text: #475569;
            --jump-btn-bg: #e2e8f0;
            --jump-btn-text: #0f172a;
            --card-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05);
            --calc-green: #10b981;
            --calc-green-dark: #059669;
        }

        [data-theme="dark"] {
            --bg-main: #020617;
            --card-bg: #0f172a;
            --text-main: #f8fafc;
            --dark: #f8fafc;
            --gray: #94a3b8;
            --option-border: #1e293b;
            --option-hover: #1e293b;
            --instruction-bg: #1e293b;
            --instruction-text: #cbd5e1;
            --success-bg: rgba(6, 78, 59, 0.3);
            --success-text: #a7f3d0;
            --success-border: #059669;
            --danger-bg: rgba(127, 29, 29, 0.3);
            --danger-text: #fecaca;
            --danger-border: #dc2626;
            --warning-bg: rgba(120, 53, 15, 0.3);
            --warning-text: #fcd34a;
            --warning-border: #d97706;
            --jump-btn-bg: #1e293b;
            --jump-btn-text: #f8fafc;
            --card-border: rgba(255, 255, 255, 0.05);
            --primary-glow: rgba(59, 130, 246, 0.2);
            --card-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        * { 
            box-sizing: border-box; 
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            transition: background-color 0.2s, color 0.2s;
            font-size: 14px;
        }

        header {
            background: #0f172a;
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        header a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px;
        }

        .quiz-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 12px;
        }

        .progress-wrapper {
            margin-bottom: 12px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray);
        }
        .progress-bar {
            width: 100%;
            background: var(--option-border);
            height: 6px;
            border-radius: 4px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .grand-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--card-border);
            position: relative;
        }

        /* Top controls badge system */
        .badge-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
        }
        
        .badge-right-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timer-badge {
            background: var(--dark);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: monospace;
            display: inline-block;
        }
        [data-theme="dark"] .timer-badge { background: #1e293b; }
        .timer-badge.warning { background: #d97706; }
        .timer-badge.danger { background: #b91c1c; }

        /* --- GREEN TOP RIGHT CALCULATOR BUTTON --- */
        .calc-toggle-btn {
            background: var(--calc-green);
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 26px; /* Matches timer vertical footprint */
        }
        .calc-toggle-btn:active { background: var(--calc-green-dark); }

        .toggle-jump-btn {
            background: var(--instruction-bg);
            color: var(--text-main);
            border: 1px solid var(--option-border);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            height: 26px;
        }

        .instruction-tag {
            background: var(--instruction-bg);
            color: var(--instruction-text);
            font-size: 0.8rem;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: 700;
            border-left: 4px solid var(--primary);
        }

        .question-area {
            position: relative;
            padding-right: 40px;
            margin-bottom: 16px;
            min-height: 36px;
            display: flex;
            align-items: center;
        }

        .question-text {
            font-size: 1.05rem;
            color: var(--text-main);
            font-weight: 600;
            line-height: 1.4;
        }

        .audio-speech-btn {
            position: absolute;
            right: 0;
            background: transparent;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--primary);
            padding: 5px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--option-border);
            border-radius: 10px;
            background: var(--card-bg);
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.1s;
            text-align: left;
            color: var(--text-main);
            font-weight: 500;
        }
        .option-btn:hover { background: var(--option-hover); }
        .option-btn.selected {
            border-color: var(--primary);
            background: var(--option-hover);
            color: var(--primary);
            font-weight: 600;
        }

        /* Rebalanced 3-Button Navigation Panel Grid */
        .control-panel {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 6px;
            align-items: center;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .action-btn:active { opacity: 0.8; }

        .submit-btn-style { background: #dc2626; }

        .flag-btn {
            background: var(--instruction-bg);
            color: var(--gray);
            border: 1px solid var(--option-border);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flag-btn.flagged {
            background: var(--warning-bg);
            color: var(--warning-text);
            border-color: var(--warning-border);
        }

        .nav-btn {
            background: var(--instruction-bg);
            color: var(--text-main);
            border: 1px solid var(--option-border);
        }

        .action-btn:disabled, .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* --- COMPACT CALCULATOR GRID --- */
        .calculator-panel {
            margin-top: 12px;
            background: #1e293b;
            border-radius: 14px;
            padding: 10px;
            display: none;
            box-shadow: var(--card-shadow);
        }
        .calc-screen {
            width: 100%;
            background: #0f172a;
            color: #10b981;
            border: none;
            padding: 10px;
            font-family: monospace;
            font-size: 1.2rem;
            text-align: right;
            border-radius: 8px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }
        .calc-btn {
            padding: 10px 4px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 6px;
            border: none;
            background: #334155;
            color: white;
            cursor: pointer;
            text-align: center;
        }
        .calc-btn:active { opacity: 0.7; }
        .calc-btn.op { background: #475569; color: #60a5fa; }
        .calc-btn.fn { background: #1e293b; color: #a78bfa; font-size: 0.75rem; }
        .calc-btn.clear { background: #991b1b; color: #fecaca; }
        .calc-btn.eq { background: var(--calc-green); color: white; grid-column: span 2; }

        /* --- NAVIGATION MAP --- */
        .jump-grid-container {
            margin-top: 12px;
            padding: 12px;
            background: var(--card-bg);
            border-radius: 14px;
            border: 1px solid var(--card-border);
        }
        .jump-grid-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .jump-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .jump-item {
            padding: 8px 0;
            text-align: center;
            border-radius: 8px;
            background: var(--jump-btn-bg);
            color: var(--jump-btn-text);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }
        .jump-item.active { background: var(--primary); color: white; }
        .jump-item.answered { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
        .jump-item.flagged { border: 1px dashed var(--warning-border); }

        /* --- REVIEW WORKSPACE --- */
        .review-card {
            margin-bottom: 12px;
            background: var(--card-bg);
            border: 1px solid var(--option-border);
            padding: 14px;
            border-radius: 14px;
        }
        .choice-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .badge-correct { background: var(--success-bg); color: var(--success-text); }
        .badge-wrong { background: var(--danger-bg); color: var(--danger-text); }
        .badge-unanswered { background: var(--warning-bg); color: var(--warning-text); }

        .review-correct { background: var(--success-bg) !important; color: var(--success-text) !important; border-color: var(--success-border) !important; }
        .review-wrong { background: var(--danger-bg) !important; color: var(--danger-text) !important; border-color: var(--danger-border) !important; }

        .explanation-box, .ai-explanation-box {
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .explanation-box { background: var(--success-bg); color: var(--success-text); border-left: 4px solid var(--success-border); }
        .ai-explanation-box { background: rgba(237, 233, 254, 0.7); color: #6b21a8; border-left: 4px solid #a855f7; }
        [data-theme="dark"] .ai-explanation-box { background: rgba(88, 28, 135, 0.2); color: #f3e8ff; }

        .explanation-title, .ai-explanation-title { font-weight: 700; margin-bottom: 4px; font-size: 0.75rem; text-transform: uppercase; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: var(--instruction-bg);
            padding: 10px 4px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-val { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .stat-lbl { font-size: 0.65rem; font-weight: 700; color: var(--gray); text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <h1>STUDY-WITH-MUBARAK</h1>
        <div class="header-controls">
            <button class="icon-btn" id="theme-toggle">🌓</button>
            <a href="index.html">Exit</a>
        </div>
    </header>

    <div class="quiz-container">
        <div id="quiz-workspace">
            <div class="progress-wrapper">
                <div class="progress-info">
                    <span id="progress-text">Question 1 of 10</span>
                    <span id="score-tracker">Active</span>
                </div>
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>

            <div class="grand-card">
                <div class="badge-controls">
                    <button class="toggle-jump-btn" id="toggle-jump-view" onclick="toggleJumpGrid()">Map</button>
                    <div class="badge-right-group">
                        <div class="timer-badge" id="timer-display">40:00</div>
                        <button class="calc-toggle-btn" onclick="toggleCalculator()" title="Open Calculator">🟢🧮</button>
                    </div>
                </div>

                <div class="instruction-tag" id="instruction-block">Loading...</div>

                <div class="question-area">
                    <div class="question-text" id="question-payload">Loading problem metrics...</div>
                    <button class="audio-speech-btn" onclick="speakQuestion()">🔊</button>
                </div>

                <div class="options-container" id="options-payload"></div>

                <div class="control-panel">
                    <button class="action-btn nav-btn" id="prev-btn" onclick="navigateQuestion(-1)">←</button>
                    <button class="flag-btn" id="flag-btn" onclick="toggleFlag()">🚩</button>
                    <button class="action-btn" id="next-btn" onclick="navigateQuestion(1)">→</button>
                </div>

                <div class="calculator-panel" id="calculator-panel">
                    <input type="text" class="calc-screen" id="calc-screen" value="0" readonly>
                    <div class="calc-grid">
                        <button class="calc-btn fn" onclick="calcFunc('sin')">sin</button>
                        <button class="calc-btn fn" onclick="calcFunc('cos')">cos</button>
                        <button class="calc-btn fn" onclick="calcFunc('tan')">tan</button>
                        <button class="calc-btn fn" onclick="calcFunc('log')">log</button>
                        <button class="calc-btn clear" onclick="clearCalc()">C</button>

                        <button class="calc-btn fn" onclick="calcFunc('sqrt')">√</button>
                        <button class="calc-btn fn" onclick="calcFunc('sq')">x²</button>
                        <button class="calc-btn op" onclick="inputCalc('(')">(</button>
                        <button class="calc-btn op" onclick="inputCalc(')')">)</button>
                        <button class="calc-btn op" onclick="inputCalc('/')">÷</button>

                        <button class="calc-btn" onclick="inputCalc('7')">7</button>
                        <button class="calc-btn" onclick="inputCalc('8')">8</button>
                        <button class="calc-btn" onclick="inputCalc('9')">9</button>
                        <button class="calc-btn op" onclick="inputCalc('*')">×</button>
                        <button class="calc-btn clear" onclick="backspaceCalc()">⌫</button>

                        <button class="calc-btn" onclick="inputCalc('4')">4</button>
                        <button class="calc-btn" onclick="inputCalc('5')">5</button>
                        <button class="calc-btn" onclick="inputCalc('6')">6</button>
                        <button class="calc-btn op" onclick="inputCalc('-')">-</button>
                        <button class="calc-btn fn" onclick="calcFunc('pi')">π</button>

                        <button class="calc-btn" onclick="inputCalc('1')">1</button>
                        <button class="calc-btn" onclick="inputCalc('2')">2</button>
                        <button class="calc-btn" onclick="inputCalc('3')">3</button>
                        <button class="calc-btn op" onclick="inputCalc('+')">+</button>
                        <button class="calc-btn eq" onclick="calculateResult()">=</button>

                        <button class="calc-btn" style="grid-column: span 2;" onclick="inputCalc('0')">0</button>
                        <button class="calc-btn" onclick="inputCalc('.')">.</button>
                    </div>
                </div>
            </div>

            <div class="jump-grid-container" id="navigator-panel" style="display:none;">
                <div class="jump-grid-label">Navigator Map</div>
                <div class="jump-grid" id="jump-grid-payload"></div>
            </div>
        </div>

        <div id="review-workspace" style="display: none;"></div>
    </div>

    <script>
        const quizData = [
            {
                instruction: "Topic: Quadratics & Polynomials",
                question: "If alpha (α) and beta (β) are the roots of the quadratic equation 2x² - 7x + 5 = 0, find the value of (α² + β²).",
                options: ["2.25", "7.25", "6.25", "12.25"],
                answer: 1,
                explanation: "α + β = -b/a = 7/2 = 3.5; αβ = c/a = 5/2 = 2.5. α² + β² = (α + β)² - 2αβ = (3.5)² - 2(2.5) = 12.25 - 5 = 7.25."
            },
            {
                instruction: "Topic: Logarithmic Equations",
                question: "Solve for x in the equation: log₃(x + 4) + log₃(x - 2) = 3.",
                options: ["x = 5", "x = -7 or x = 5", "x = 7", "x = 2 or x = -4"],
                answer: 0,
                explanation: "log₃((x + 4)(x - 2)) = 3 => (x + 4)(x - 2) = 3³ = 27 => x² + 2x - 35 = 0 => (x + 7)(x - 5) = 0. Since log parameters must be positive, x = 5."
            },
            {
                instruction: "Topic: Coordinate Geometry",
                question: "Find the perpendicular distance from the origin (0,0) to the straight line given by the equation 3x - 4y + 20 = 0.",
                options: ["2 units", "4 units", "5 units", "20 units"],
                answer: 1,
                explanation: "Distance = |Ax₁ + By₁ + C| / √(A² + B²) = |3(0) - 4(0) + 20| / √(3² + (-4)²) = 20 / 5 = 4 units."
            },
            {
                instruction: "Topic: Sequences & Series",
                question: "The 3rd and 7th terms of a Geometric Progression (G.P.) are 18 and 1458 respectively. Find the first term (a) if the common ratio (r) is positive.",
                options: ["2", "3", "6", "9"],
                answer: 0,
                explanation: "T₇/T₃ = ar⁶/ar² = r⁴ = 1458/18 = 81 => r = 3. T₃ = a(3)² = 18 => 9a = 18 => a = 2."
            },
            {
                instruction: "Topic: Differential Calculus",
                question: "Find the coordinates of the turning point on the curve y = 2x³ - 3x² - 12x + 5 where a local maximum occurs.",
                options: ["(2, -15)", "(-1, 12)", "(1, -8)", "(-2, 1)"],
                answer: 1,
                explanation: "dy/dx = 6x² - 6x - 12 = 0 => (x - 2)(x + 1) = 0. d²y/dx² = 12x - 6. At x = -1, d²y/dx² = -18 (max). Substituting x = -1 into the equation gives y = 12."
            },
            {
                instruction: "Topic: Integral Calculus",
                question: "Evaluate the definite integral of (3x² - 2x + 1) with respect to x from lower limit x = 1 to upper limit x = 3.",
                options: ["24", "20", "18", "22"],
                answer: 1,
                explanation: "∫(3x² - 2x + 1)dx = [x³ - x² + x]. From 1 to 3: (27 - 9 + 3) - (1 - 1 + 1) = 21 - 1 = 20."
            },
            {
                instruction: "Topic: Trigonometric Identities",
                question: "If sin(θ) = 12/13 and θ is an obtuse angle (90° < θ < 180°), calculate the precise value of sec(θ).",
                options: ["13/5", "-13/5", "-13/12", "5/13"],
                answer: 1,
                explanation: "cos²θ = 1 - sin²θ = 1 - 144/169 = 25/169. Obtuse angle means Q2 (cos is negative) => cosθ = -5/13. secθ = 1/cosθ = -13/5."
            },
            {
                instruction: "Topic: Matrix Operations & Determinants",
                question: "Find the value of k for which the matrix [[k, 3], [12, k]] is singular.",
                options: ["k = 6 or k = -6", "k = 36", "k = 4", "k = 0"],
                answer: 0,
                explanation: "Singular matrix determinant is 0 => (k * k) - (3 * 12) = 0 => k² = 36 => k = ±6."
            },
            {
                instruction: "Topic: Probability Distributive Vectors",
                question: "A bag contains 4 white balls and 6 black balls. Two balls are drawn at random one after another without replacement. Find the probability that both balls drawn are white.",
                options: ["16/100", "2/15", "4/15", "1/3"],
                answer: 1,
                explanation: "P(Both white) = (4/10) * (3/9) = 12/90 = 2/15."
            },
            {
                instruction: "Topic: Circle Theorems & Vector Geometry",
                question: "Find the radius of the circle defined by the general Cartesian equation: x² + y² - 6x + 8y - 11 = 0.",
                options: ["6 units", "√(11) units", "5 units", "36 units"],
                answer: 0,
                explanation: "g = -3, f = 4, c = -11. Radius r = √(g² + f² - c) = √(9 + 16 - (-11)) = √36 = 6."
            }
        ];

        let currentIndex = 0;
        let userAnswers = Array(quizData.length).fill(null);
        let flaggedQuestions = Array(quizData.length).fill(false);
        let timeLeft = 40 * 60;
        let countdownTimer;

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        function startTimer() {
            countdownTimer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    autoSubmitQuiz();
                } else {
                    timeLeft--;
                    renderTimer();
                }
            }, 1000);
        }

        function renderTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const timerEl = document.getElementById('timer-display');
            timerEl.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (timeLeft <= 300 && timeLeft > 60) timerEl.className = "timer-badge warning";
            else if (timeLeft <= 60) timerEl.className = "timer-badge danger";
        }

        function toggleJumpGrid() {
            const panel = document.getElementById('navigator-panel');
            panel.style.display = panel.style.display === "none" ? "block" : "none";
        }

        function toggleCalculator() {
            const panel = document.getElementById('calculator-panel');
            panel.style.display = panel.style.display === "block" ? "none" : "block";
        }

        function inputCalc(val) {
            const screen = document.getElementById('calc-screen');
            if (screen.value === "0" || screen.value === "Error") screen.value = val;
            else screen.value += val;
        }

        function clearCalc() { document.getElementById('calc-screen').value = "0"; }

        function backspaceCalc() {
            const screen = document.getElementById('calc-screen');
            screen.value = screen.value.slice(0, -1) || "0";
        }

        function calcFunc(type) {
            const screen = document.getElementById('calc-screen');
            let currentVal = parseFloat(screen.value);
            if (isNaN(currentVal) && type !== 'pi') { screen.value = "Error"; return; }

            switch(type) {
                case 'sin': screen.value = Math.sin(currentVal * Math.PI / 180).toFixed(4); break;
                case 'cos': screen.value = Math.cos(currentVal * Math.PI / 180).toFixed(4); break;
                case 'tan': screen.value = Math.tan(currentVal * Math.PI / 180).toFixed(4); break;
                case 'log': screen.value = currentVal > 0 ? Math.log10(currentVal).toFixed(4) : "Error"; break;
                case 'sqrt': screen.value = currentVal >= 0 ? Math.sqrt(currentVal).toFixed(4) : "Error"; break;
                case 'sq': screen.value = Math.pow(currentVal, 2); break;
                case 'pi': screen.value = Math.PI.toFixed(4); break;
            }
        }

        function calculateResult() {
            const screen = document.getElementById('calc-screen');
            try {
                let expr = screen.value.replace(/×/g, '*').replace(/÷/g, '/');
                let result = eval(expr);
                screen.value = Number.isInteger(result) ? result : result.toFixed(4);
            } catch (e) { screen.value = "Error"; }
        }

        function speakQuestion() {
            window.speechSynthesis.cancel();
            const currentItem = quizData[currentIndex];
            const utterance = new SpeechSynthesisUtterance(currentItem.question);
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function renderQuestion() {
            const data = quizData[currentIndex];
            document.getElementById('progress-text').innerText = `Q ${currentIndex + 1}/${quizData.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / quizData.length) * 100}%`;
            document.getElementById('instruction-block').innerText = data.instruction;
            document.getElementById('question-payload').innerText = data.question;

            const optionsContainer = document.getElementById('options-payload');
            optionsContainer.innerHTML = '';
            
            data.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = `option-btn ${userAnswers[currentIndex] === index ? 'selected' : ''}`;
                button.innerText = option;
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });

            document.getElementById('prev-btn').disabled = currentIndex === 0;
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = currentIndex === quizData.length - 1 ? "Finish" : "→";
            nextBtn.className = currentIndex === quizData.length - 1 ? "action-btn submit-btn-style" : "action-btn";

            const flagBtn = document.getElementById('flag-btn');
            flagBtn.className = flaggedQuestions[currentIndex] ? "flag-btn flagged" : "flag-btn";

            renderJumpGrid();
        }

        function selectOption(index) {
            userAnswers[currentIndex] = index;
            renderQuestion();
        }

        function toggleFlag() {
            flaggedQuestions[currentIndex] = !flaggedQuestions[currentIndex];
            renderQuestion();
        }

        function navigateQuestion(step) {
            window.speechSynthesis.cancel();
            if (step === 1 && currentIndex === quizData.length - 1) {
                if (confirm("Submit diagnostic?")) processDiagnosticsResult();
                return;
            }
            currentIndex += step;
            renderQuestion();
        }

        function renderJumpGrid() {
            const grid = document.getElementById('jump-grid-payload');
            grid.innerHTML = '';
            quizData.forEach((_, index) => {
                const item = document.createElement('div');
                let cl = 'jump-item';
                if (index === currentIndex) cl += ' active';
                else if (userAnswers[index] !== null) cl += ' answered';
                if (flaggedQuestions[index]) cl += ' flagged';
                item.className = cl;
                item.innerText = index + 1;
                item.onclick = () => { currentIndex = index; renderQuestion(); };
                grid.appendChild(item);
            });
        }

        function autoSubmitQuiz() { processDiagnosticsResult(); }

        function processDiagnosticsResult() {
            clearInterval(countdownTimer);
            window.speechSynthesis.cancel();
            document.getElementById('quiz-workspace').style.display = 'none';
            
            const reviewWorkspace = document.getElementById('review-workspace');
            reviewWorkspace.style.display = 'block';

            let score = 0;
            quizData.forEach((d, i) => { if (userAnswers[i] === d.answer) score++; });

            let reviewHTML = `
                <div class="grand-card" style="margin-bottom: 12px;">
                    <h3 style="margin:0 0 10px 0; font-weight:700;">Diagnostic Done</h3>
                    <div class="dashboard-grid">
                        <div class="stat-card"><div class="stat-val">${score}/${quizData.length}</div><div class="stat-lbl">Score</div></div>
                        <div class="stat-card"><div class="stat-val">${((score/quizData.length)*100).toFixed(0)}%</div><div class="stat-lbl">Metric</div></div>
                        <div class="stat-card"><div class="stat-val">${40 - Math.ceil(timeLeft/60)}m</div><div class="stat-lbl">Time</div></div>
                    </div>
                    <button class="action-btn" style="width:100%;" onclick="window.location.reload();">Retry</button>
                </div>
            `;

            quizData.forEach((data, index) => {
                const uChoice = userAnswers[index];
                const isCorrect = uChoice === data.answer;
                let bClass = uChoice === null ? "badge-unanswered" : (isCorrect ? "badge-correct" : "badge-wrong");
                let bText = uChoice === null ? "Skipped" : (isCorrect ? "Correct" : "Incorrect");

                reviewHTML += `
                    <div class="review-card">
                        <div style="display:flex; justify-content:between; align-items:center;">
                            <span class="choice-badge ${bClass}">${bText}</span>
                        </div>
                        <div class="question-text" style="font-size:0.95rem; margin-bottom:10px;">Q${index + 1}: ${data.question}</div>
                        <div class="options-container">
                `;

                data.options.forEach((opt, oIdx) => {
                    let mClass = (oIdx === data.answer) ? "review-correct" : ((oIdx === uChoice && !isCorrect) ? "review-wrong" : "");
                    reviewHTML += `<div class="option-btn ${mClass}" style="pointer-events:none; padding:8px 10px; font-size:0.85rem;">${opt}</div>`;
                });

                reviewHTML += `
                        </div>
                        <div class="explanation-box"><div class="explanation-title">📝 Resolution Derivation</div>${data.explanation}</div>
                        <div class="ai-explanation-box" id="ai-explanation-${index}">
                            <div class="ai-explanation-title">🤖 AI Assistant Analysis (Mubarak)</div>
                            <div class="ai-content-target" id="ai-target-${index}">Syncing analysis step vectors...</div>
                        </div>
                    </div>
                `;
            });

            reviewWorkspace.innerHTML = reviewHTML;
            quizData.forEach((data, index) => { fetchAIExplanation(index, data); });
        }

        async function fetchAIExplanation(index, data) {
            const targetDiv = document.getElementById(`ai-target-${index}`);
            const prompt = `You are the AI assistant Mubarak within a high-performance web training framework. Provide a crisp, structured, step-by-step mathematical breakdown for this problem: "${data.question}". The correct mathematical option is "${data.options[data.answer]}". Explain formulas directly. Keep output concise and professional. Do not use markdown headers like h1 or h2.`;
            try {
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                const textOutput = await response.text();
                targetDiv.innerText = textOutput;
            } catch (e) {
                targetDiv.innerText = "Unable to sync with the Mubarak AI node.";
            }
        }

        window.onload = () => { initTheme(); renderQuestion(); startTimer(); };
    </script>
</body>
</html>
