<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study With Mubarak</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }

nav {
    background:#0a192f;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

nav button {
    margin-left:10px;
}

.section { padding:20px; display:none; }
.active { display:block; }

.card {
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
}

input, button {
    padding:10px;
    margin:5px 0;
    width:100%;
}
</style>
</head>

<body>

<nav>
    <h3>Study With Mubarak</h3>
    <div>
        <button onclick="show('home')">Home</button>
        <button onclick="show('quiz')">Quiz</button>
        <button onclick="show('notes')">Notes</button>
        <button onclick="show('ai')">AI Tutor</button>
        <button onclick="show('auth')">Login</button>
    </div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
    <h2>Welcome</h2>
    <p>Your smart learning platform</p>
</div>

<!-- AUTH -->
<div id="auth" class="section">
    <h2>Login / Signup</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <p id="authMsg"></p>
</div>

<!-- QUIZ -->
<div id="quiz" class="section">
    <h2>Quiz</h2>
    <p id="question"></p>
    <input id="answer" placeholder="Your answer">
    <button onclick="checkAnswer()">Submit</button>
    <p id="result"></p>
</div>

<!-- NOTES -->
<div id="notes" class="section">
    <h2>Upload Notes</h2>
    <input id="noteInput" placeholder="Write your note">
    <button onclick="saveNote()">Save</button>
    <div id="notesList"></div>
</div>

<!-- AI -->
<div id="ai" class="section">
    <h2>AI Tutor</h2>
    <input id="aiInput" placeholder="Ask something...">
    <button onclick="askAI()">Ask</button>
    <p id="aiResponse"></p>
</div>

<script>

// Navigation
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// AUTH SYSTEM
function signup(){
    let u = username.value;
    let p = password.value;
    localStorage.setItem(u, p);
    authMsg.innerText = "Account created!";
}

function login(){
    let u = username.value;
    let p = password.value;
    if(localStorage.getItem(u) === p){
        authMsg.innerText = "Login successful!";
    } else {
        authMsg.innerText = "Invalid login!";
    }
}

// QUIZ
let currentQ = {q:"2 + 2 = ?", a:"4"};
question.innerText = currentQ.q;

function checkAnswer(){
    if(answer.value == currentQ.a){
        result.innerText = "Correct!";
    } else {
        result.innerText = "Wrong!";
    }
}

// NOTES
function saveNote(){
    let note = noteInput.value;
    let notes = JSON.parse(localStorage.getItem("notes") || "[]");
    notes.push(note);
    localStorage.setItem("notes", JSON.stringify(notes));
    displayNotes();
}

function displayNotes(){
    let notes = JSON.parse(localStorage.getItem("notes") || "[]");
    notesList.innerHTML = notes.map(n=>"<div class='card'>"+n+"</div>").join("");
}
displayNotes();

// AI (Basic Fake AI)
function askAI(){
    let q = aiInput.value.toLowerCase();
    if(q.includes("math")){
        aiResponse.innerText = "Math is the study of numbers.";
    } else {
        aiResponse.innerText = "I am still learning. Ask something else.";
    }
}

</script>

</body>
</html>
