<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY WITH MUBARAK | Dual-View Portal</title>
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e293b;
            --accent: #f59e0b;
            --bg: #f8fafc;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }

        /* This container holds both halves */
        .master-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* TOP SECTION: Your Study Hall */
        #top-section {
            flex: 1; /* Takes full screen until AI is clicked */
            background: var(--bg);
            overflow-y: auto;
            transition: flex 0.5s ease;
            border-bottom: 4px solid var(--secondary);
        }

        /* BOTTOM SECTION: The AI Hall */
        #bottom-section {
            flex: 0; /* Hidden at first */
            background: white;
            transition: flex 0.5s ease;
            display: flex;
            flex-direction: column;
        }

        /* Header Styling */
        header { background: var(--secondary); color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; max-width: 800px; margin: auto; }

        /* Subject Cards */
        .card { 
            background: white; padding: 20px; border-radius: 15px; 
            margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0; text-align: center;
        }
        .btn { 
            display: inline-block; background: var(--primary); color: white; 
            padding: 10px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; 
        }

        /* THE AI BUTTON */
        .ai-trigger {
            background: linear-gradient(90deg, #f59e0b, #d97706);
            color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: bold; cursor: pointer; border: none; font-size: 1rem;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
            margin: 20px auto; display: block;
        }

        /* The Frame for the Assistant */
        iframe { width: 100%; height: 100%; border: none; }

        /* Close Button for the AI */
        #close-ai {
            display: none; background: #ef4444; color: white; 
            border: none; padding: 5px 15px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="master-container">
    
    <div id="top-section">
        <header>
            <h1 style="margin:0;">STUDY WITH MUBARAK</h1>
        </header>

        <div class="container">
            <div class="card">
                <h2>English & Government</h2>
                <p>Select your subject below to begin practicing.</p>
                <a href="english.html" class="btn">English</a>
                <a href="government.html" class="btn">Government</a>
                <a href="random subject.html" class="btn" style="background:#10b981;">General Studies</a>
            </div>

            <button class="ai-trigger" onclick="openSplitAI()">✨ OPEN AI ASSISTANT (SPLIT VIEW)</button>
        </div>
    </div>

    <div id="bottom-section">
        <div style="background:#334155; color:white; padding:10px; display:flex; justify-content:space-between;">
            <span>Mubarak AI Learning Helper</span>
            <button id="close-ai" onclick="closeSplitAI()">CLOSE AI [X]</button>
        </div>
        <iframe id="ai-frame" src=""></iframe>
    </div>

</div>

<script>
    function openSplitAI() {
        const top = document.getElementById('top-section');
        const bottom = document.getElementById('bottom-section');
        const closeBtn = document.getElementById('close-ai');
        const frame = document.getElementById('ai-frame');

        // Split the screen: Top gets 40%, Bottom gets 60%
        top.style.flex = "0.4";
        bottom.style.flex = "0.6";
        closeBtn.style.display = "block";
        
        // We use a specialized educational search that allows framing
        // If you want the REAL Gemini, it MUST open in a new tab due to Google's security.
        frame.src = "https://www.bing.com/search?q=Academic+Help+for+Students"; 
    }

    function closeSplitAI() {
        const top = document.getElementById('top-section');
        const bottom = document.getElementById('bottom-section');
        const closeBtn = document.getElementById('close-ai');
        
        top.style.flex = "1";
        bottom.style.flex = "0";
        closeBtn.style.display = "none";
    }
</script>

</body>
</html>
