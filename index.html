<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study With Mubarak</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h2>Study With Mubarak</h2>
    <div>
        <button onclick="show('home')">Home</button>
        <button onclick="show('quiz')">Quiz</button>
        <button onclick="show('notes')">Notes</button>
        <button onclick="show('ai')">AI Tutor</button>
        <button onclick="show('auth')">Login</button>
    </div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
    <h2>Welcome</h2>
    <p>Your smart learning platform</p>

    <div class="profile">
        <img src="your-image.jpg" alt="My Picture">
        <h3>Mubarak</h3>
    </div>
</div>

<!-- LOGIN -->
<div id="auth" class="section">
    <h2>Login / Signup</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <p id="authMsg"></p>
</div>

<!-- QUIZ -->
<div id="quiz" class="section">
    <h2>Quiz</h2>
    <p id="question"></p>
    <input id="answer" placeholder="Your answer">
    <button onclick="checkAnswer()">Submit</button>
    <p id="result"></p>
</div>

<!-- NOTES -->
<div id="notes" class="section">
    <h2>Notes</h2>
    <input id="noteInput" placeholder="Write your note">
    <button onclick="saveNote()">Save Note</button>
    <div id="notesList"></div>
</div>

<!-- AI -->
<div id="ai" class="section">
    <h2>AI Tutor</h2>
    <input id="aiInput" placeholder="Ask a question...">
    <button onclick="askAI()">Ask</button>
    <p id="aiResponse"></p>
</div>

<script>

// Navigation
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// AUTH
function signup(){
    let u = username.value;
    let p = password.value;
    localStorage.setItem(u, p);
    authMsg.innerText = "Account created!";
}

function login(){
    let u = username.value;
    let p = password.value;
    if(localStorage.getItem(u) === p){
        authMsg.innerText = "Login successful!";
    } else {
        authMsg.innerText = "Invalid login!";
    }
}

// QUIZ
let currentQ = {q:"2 + 2 = ?", a:"4"};
question.innerText = currentQ.q;

function checkAnswer(){
    if(answer.value == currentQ.a){
        result.innerText = "Correct!";
    } else {
        result.innerText = "Wrong!";
    }
}

// NOTES (EDITABLE)
function saveNote(){
    let note = noteInput.value;
    let notes = JSON.parse(localStorage.getItem("notes") || "[]");
    notes.push(note);
    localStorage.setItem("notes", JSON.stringify(notes));
    noteInput.value = "";
    displayNotes();
}

function editNote(index){
    let notes = JSON.parse(localStorage.getItem("notes"));
    noteInput.value = notes[index];
    notes.splice(index,1);
    localStorage.setItem("notes", JSON.stringify(notes));
    displayNotes();
}

function deleteNote(index){
    let notes = JSON.parse(localStorage.getItem("notes"));
    notes.splice(index,1);
    localStorage.setItem("notes", JSON.stringify(notes));
    displayNotes();
}

function displayNotes(){
    let notes = JSON.parse(localStorage.getItem("notes") || "[]");
    notesList.innerHTML = notes.map((n,i)=>`
        <div class='card'>
            ${n}
            <br>
            <button onclick="editNote(${i})">Edit</button>
            <button onclick="deleteNote(${i})">Delete</button>
        </div>
    `).join("");
}
displayNotes();

// AI (Improved)
function askAI(){
    let q = aiInput.value.toLowerCase();
    let response = "";

    if(q.includes("name")){
        response = "I am Mubarak AI Tutor 🤖";
    }
    else if(q.includes("math")){
        response = "Math involves numbers, algebra, geometry and more.";
    }
    else if(q.includes("english")){
        response = "English includes grammar, comprehension and writing.";
    }
    else if(q.includes("biology")){
        response = "Biology is the study of living things.";
    }
    else if(q.includes("physics")){
        response = "Physics deals with energy and motion.";
    }
    else if(q.includes("chemistry")){
        response = "Chemistry studies substances and reactions.";
    }
    else{
        response = "Ask me about subjects like Math, English, Biology.";
    }

    aiResponse.innerText = response;
}

</script>

</body>
</html>
