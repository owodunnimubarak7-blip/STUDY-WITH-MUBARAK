<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Assistant - Instant Answers to All Your Questions">
    <title>AI Assistant | STUDY WITH MUBARAK</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #1e293b;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .ai-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .ai-sidebar {
            width: 280px;
            background: var(--secondary);
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }

        .ai-sidebar-header {
            padding: 24px 20px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(16, 185, 129, 0.1));
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .ai-sidebar-header h2 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ai-sidebar-header p {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }

        .new-chat-btn {
            margin: 16px;
            padding: 12px 20px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item:hover {
            background: rgba(255,255,255,0.1);
            border-left-color: var(--primary);
        }

        .chat-item.active {
            background: rgba(37, 99, 235, 0.2);
            border-left-color: var(--primary);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .clear-history-btn {
            width: 100%;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .clear-history-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }

        /* Main Chat Area */
        .ai-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .ai-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] .ai-header {
            background: var(--secondary);
            border-bottom-color: rgba(255,255,255,0.1);
        }

        .ai-header h1 {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .ai-controls {
            display: flex;
            gap: 12px;
        }

        .control-btn {
            padding: 8px 16px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .control-btn.secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .control-btn.secondary:hover {
            background: var(--card-bg);
            color: var(--text-main);
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--gradient);
            color: white;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .message-content {
            max-width: 70%;
            background: var(--card-bg);
            border-radius: 14px;
            padding: 14px 18px;
            border: 1px solid var(--border-color);
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--gradient);
            color: white;
            border: none;
        }

        .message-content p {
            margin: 8px 0;
            line-height: 1.6;
        }

        .message-content p:first-child {
            margin-top: 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-content li {
            margin: 4px 0;
        }

        .message-content code {
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message.user .message-content code {
            background: rgba(255,255,255,0.2);
        }

        .message-content pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 14px 18px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .empty-state p {
            margin-bottom: 24px;
            max-width: 400px;
        }

        .suggested-questions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .question-suggestion {
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            text-align: left;
        }

        .question-suggestion:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Input Area */
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid var(--border-color);
        }

        [data-theme="dark"] .chat-input-area {
            background: var(--secondary);
            border-top-color: rgba(255,255,255,0.1);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            padding: 12px 24px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-btn {
            display: none;
            padding: 8px 16px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            color: var(--text-main);
            border-color: var(--text-main);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .ai-sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 999;
                transition: left 0.3s ease;
                box-shadow: 2px 0 8px rgba(0,0,0,0.2);
            }

            .ai-sidebar.open {
                left: 0;
            }

            .sidebar-toggle {
                display: block;
            }

            .ai-sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 998;
            }

            .ai-sidebar-overlay.visible {
                display: block;
            }

            .message-content {
                max-width: 90%;
            }

            .back-btn {
                display: inline-flex;
            }
        }
    </style>
</head>
<body>

<div class="ai-container">
    <!-- Sidebar -->
    <div class="ai-sidebar" id="ai-sidebar">
        <div class="ai-sidebar-header">
            <h2>💬 Chat History</h2>
            <p>Your conversations</p>
        </div>
        
        <button class="new-chat-btn" onclick="startNewChat()">
            <span>➕</span>
            <span>New Chat</span>
        </button>

        <div class="chat-history" id="chat-history"></div>

        <div class="sidebar-footer">
            <button class="clear-history-btn" onclick="clearChatHistory()">🗑️ Clear History</button>
        </div>
    </div>

    <div class="ai-sidebar-overlay" id="ai-sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Main Chat -->
    <div class="ai-main">
        <div class="ai-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="back-btn" id="sidebar-toggle" onclick="toggleSidebar()">☰ Menu</button>
                <h1>🤖 AI Assistant</h1>
            </div>
            <div class="ai-controls">
                <button class="control-btn secondary" onclick="toggleTheme()" id="theme-toggle">🌙 Dark</button>
                <button class="control-btn secondary" onclick="goHome()">← Back Home</button>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="input-field" 
                    id="message-input" 
                    placeholder="Ask me anything... (JAMB, WAEC, SSCE questions, explanations, etc.)"
                    onkeypress="handleKeyPress(event)"
                >
                <button class="send-btn" id="send-btn" onclick="sendMessage()">
                    <span>📤</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentChatId = null;
    let allChats = {};
    let isLoading = false;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        loadTheme();
        loadChats();
        startNewChat();
    });

    // Theme Management
    function loadTheme() {
        const theme = localStorage.getItem('ai-theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        updateThemeBtn();
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('ai-theme', newTheme);
        updateThemeBtn();
    }

    function updateThemeBtn() {
        const theme = document.documentElement.getAttribute('data-theme');
        document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }

    // Sidebar Toggle (Mobile)
    function toggleSidebar() {
        const sidebar = document.getElementById('ai-sidebar');
        const overlay = document.getElementById('ai-sidebar-overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('visible');
    }

    // Chat Management
    function startNewChat() {
        currentChatId = 'chat_' + Date.now();
        allChats[currentChatId] = {
            id: currentChatId,
            title: 'New Conversation',
            messages: [],
            created: new Date()
        };
        saveChats();
        renderChatMessages();
        renderChatHistory();
        showEmptyState();
        closeSidebar();
    }

    function loadChats() {
        const saved = localStorage.getItem('ai-chats');
        if (saved) {
            allChats = JSON.parse(saved);
            const lastChat = Object.keys(allChats).pop();
            if (lastChat) {
                currentChatId = lastChat;
            }
        }
        if (!currentChatId) {
            startNewChat();
        }
        renderChatHistory();
        renderChatMessages();
    }

    function saveChats() {
        localStorage.setItem('ai-chats', JSON.stringify(allChats));
    }

    function clearChatHistory() {
        if (confirm('Are you sure you want to delete all conversations?')) {
            allChats = {};
            saveChats();
            startNewChat();
        }
    }

    function selectChat(chatId) {
        currentChatId = chatId;
        renderChatHistory();
        renderChatMessages();
        closeSidebar();
    }

    function closeSidebar() {
        document.getElementById('ai-sidebar').classList.remove('open');
        document.getElementById('ai-sidebar-overlay').classList.remove('visible');
    }

    function renderChatHistory() {
        const container = document.getElementById('chat-history');
        container.innerHTML = '';

        Object.values(allChats)
            .sort((a, b) => new Date(b.created) - new Date(a.created))
            .forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.textContent = chat.title;
                item.onclick = () => selectChat(chat.id);
                container.appendChild(item);
            });
    }

    // Message Handling
    function renderChatMessages() {
        const container = document.getElementById('chat-messages');
        const chat = allChats[currentChatId];
        
        if (!chat || chat.messages.length === 0) {
            showEmptyState();
            return;
        }

        container.innerHTML = '';
        chat.messages.forEach(msg => {
            const msgEl = document.createElement('div');
            msgEl.className = `message ${msg.role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = msg.role === 'user' ? '👤' : '🤖';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = marked.parse(msg.content);

            msgEl.appendChild(avatar);
            msgEl.appendChild(content);
            container.appendChild(msgEl);
        });

        container.scrollTop = container.scrollHeight;
    }

    function showEmptyState() {
        const container = document.getElementById('chat-messages');
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">🤖</div>
                <h2>Welcome to AI Assistant</h2>
                <p>Ask me anything about JAMB, WAEC, SSCE, or any academic topic. I'm here to help!</p>
                <div class="suggested-questions">
                    <button class="question-suggestion" onclick="askQuestion('What are the causes of soil erosion and how can it be prevented?')">
                        📚 Soil Erosion
                    </button>
                    <button class="question-suggestion" onclick="askQuestion('Explain the structure and function of mitochondria')">
                        🧬 Mitochondria
                    </button>
                    <button class="question-suggestion" onclick="askQuestion('What are the major themes in Things Fall Apart by Chinua Achebe?')">
                        📖 Literature
                    </button>
                    <button class="question-suggestion" onclick="askQuestion('How does photosynthesis work? Explain the light and dark reactions')">
                        🌱 Photosynthesis
                    </button>
                </div>
            </div>
        `;
    }

    // AI Response
    async function sendMessage() {
        const input = document.getElementById('message-input');
        const message = input.value.trim();
        
        if (!message || isLoading) return;

        input.value = '';
        isLoading = true;
        document.getElementById('send-btn').disabled = true;

        // Add user message
        const chat = allChats[currentChatId];
        chat.messages.push({
            role: 'user',
            content: message
        });

        // Update title from first message
        if (chat.messages.length === 1) {
            chat.title = message.substring(0, 50) + (message.length > 50 ? '...' : '');
        }

        renderChatMessages();
        saveChats();
        renderChatHistory();

        // Show typing indicator
        const container = document.getElementById('chat-messages');
        const typingMsg = document.createElement('div');
        typingMsg.className = 'message ai';
        typingMsg.innerHTML = `
            <div class="message-avatar">🤖</div>
            <div class="message-content">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        `;
        container.appendChild(typingMsg);
        container.scrollTop = container.scrollHeight;

        try {
            const response = await generateAIResponse(message);
            
            // Remove typing indicator
            typingMsg.remove();

            // Add AI response
            chat.messages.push({
                role: 'ai',
                content: response
            });

            renderChatMessages();
            saveChats();

        } catch (error) {
            console.error('Error:', error);
            typingMsg.remove();

            chat.messages.push({
                role: 'ai',
                content: '❌ **Error generating response**\n\nI encountered an issue while processing your request. Please check your internet connection and try again.'
            });

            renderChatMessages();
            saveChats();
        }

        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('message-input').focus();
    }

    function askQuestion(question) {
        document.getElementById('message-input').value = question;
        sendMessage();
    }

    async function generateAIResponse(question) {
        const context = `You are Mubarak, an expert tutor for JAMB, WAEC, and SSCE exams. 
        
Your role:
- Provide clear, comprehensive, and well-structured explanations
- Focus on academic excellence for Nigerian students
- Use simple language but maintain academic rigor
- Include relevant examples and real-world applications
- Format responses with proper markdown (headings, lists, code blocks where appropriate)
- Be encouraging and supportive

Question: ${question}

Provide a detailed, helpful response:`;

        try {
            // Using Pollinations AI (Free Tier)
            const response = await fetch('https://text.pollinations.ai/' + encodeURIComponent(context) + '?model=searchgpt', {
                method: 'GET',
                headers: {
                    'Accept': 'text/plain',
                }
            });

            if (response.ok) {
                const text = await response.text();
                return text || generateMockResponse(question);
            }

            return generateMockResponse(question);

        } catch (error) {
            console.error('API failed:', error);
            return generateMockResponse(question);
        }
    }

    function generateMockResponse(question) {
        // Educational mock responses for demo
        const lowerQuestion = question.toLowerCase();
        
        if (lowerQuestion.includes('mitochondria')) {
            return `## The Mitochondria: Powerhouse of the Cell

**Structure:**
- Double membrane envelope
- Cristae (inner foldings for increased surface area)
- Matrix (inner compartment)
- Contains its own DNA and ribosomes

**Functions:**
1. **ATP Production** - Primary function through aerobic respiration
2. **Energy Release** - Controlled breakdown of glucose
3. **Heat Production** - In brown adipose tissue
4. **Calcium Storage** - Regulates cellular calcium levels

**Significance:** The more active a cell, the more mitochondria it contains. Muscle cells can have thousands of mitochondria!`;
        }
        
        if (lowerQuestion.includes('photosynthesis')) {
            return `## Photosynthesis: How Plants Make Food

**Light Reactions (Thylakoid Membrane):**
- Occurs in presence of light
- Water molecules split (photolysis)
- ATP and NADPH produced
- Oxygen released as byproduct

**Dark Reactions (Calvin Cycle - Stroma):**
- Can occur with or without light
- Uses ATP and NADPH from light reactions
- Carbon dioxide fixed into glucose
- No direct light required

**Equation:**
\`\`\`
6CO₂ + 6H₂O + light energy → C₆H₁₂O₆ + 6O₂
\`\`\``;
        }
        
        if (lowerQuestion.includes('erosion')) {
            return `## Soil Erosion: Causes and Prevention

**Causes:**
1. Water erosion (rainfall, runoff)
2. Wind erosion (strong winds)
