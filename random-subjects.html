<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elective Hub | Study With Mubarak</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-solid: #1e293b;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --blur: blur(16px);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.75);
            --surface-solid: #ffffff;
            --border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --success: #059669;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        body {
            margin: 0; padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text-main);
            min-height: 100vh; transition: background 0.3s, color 0.3s;
        }

        .navbar {
            padding: 20px 24px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--surface); backdrop-filter: var(--blur);
        }

        .back-btn {
            color: var(--text-main); text-decoration: none; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }

        .container {
            max-width: 800px; margin: 40px auto; padding: 0 24px;
        }

        .quiz-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 40px; box-shadow: var(--shadow);
            backdrop-filter: var(--blur); margin-bottom: 24px;
        }

        .subject-selector {
            display: flex; gap: 10px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px;
        }
        .subject-selector::-webkit-scrollbar { display: none; }

        .chip {
            background: var(--surface-solid); border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 16px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap;
        }
        .chip.active {
            background: var(--success); color: white; border-color: transparent;
        }

        .question-text {
            font-size: 1.25rem; font-weight: 700; margin: 24px 0; line-height: 1.6;
        }

        .options-grid {
            display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 24px;
        }

        .option-btn {
            background: var(--surface-solid); border: 1px solid var(--border);
            color: var(--text-main); padding: 16px 24px; border-radius: 14px;
            text-align: left; font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            border-color: var(--success); background: rgba(16, 185, 129, 0.1);
            transform: translateX(4px);
        }

        .action-dock {
            display: flex; justify-content: space-between; margin-top: 32px;
        }

        .nav-action {
            background: var(--surface-solid); color: var(--text-main);
            border: 1px solid var(--border); padding: 12px 24px;
            border-radius: 12px; cursor: pointer; font-weight: 700;
        }

        .nav-action.primary {
            background: var(--success); color: white; border: none;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="back-btn">➔ Back to Portal</a>
    <div style="font-weight: 800; letter-spacing: -0.02em;">DYNAMIC ELECTIVE HUB</div>
</div>

<div class="container">
    <div class="subject-selector">
        <div class="chip active">🧬 Biology</div>
        <div class="chip">⚗️ Chemistry</div>
        <div class="chip">🔋 Physics</div>
        <div class="chip">📈 Economics</div>
        <div class="chip">📖 Literature</div>
    </div>

    <div class="quiz-card">
        <div class="question-text" id="questionBox">
            Which of the following cell organelles is primarily responsible for synthesis and transport of lipids and steroid hormones within a mammalian cell architecture?
        </div>

        <div class="options-grid">
            <button class="option-btn" onclick="triggerSelection()">A. Smooth Endoplasmic Reticulum</button>
            <button class="option-btn" onclick="triggerSelection()">B. Rough Endoplasmic Reticulum</button>
            <button class="option-btn" onclick="triggerSelection()">C. Golgi Apparatus Complex</button>
            <button class="option-btn" onclick="triggerSelection()">D. Lysosomal Matrix</button>
        </div>

        <div class="action-dock">
            <button class="nav-action">Shuffle Subject</button>
            <button class="nav-action primary">Verify Answer</button>
        </div>
    </div>
</div>

<script>
    // Sync UI display system configuration parameter variants dynamically 
    const CORE_STATE_KEY = 'STUDY_WITH_MUBARAK_STORE';
    try {
        const storedData = localStorage.getItem(CORE_STATE_KEY);
        if (storedData) {
            const parsed = JSON.parse(storedData);
            document.documentElement.setAttribute('data-theme', parsed.theme || 'dark');
        }
    } catch(e) { console.error("Sync error:", e); }

    function triggerSelection() {
        alert("Choice tracked successfully. Explore your dashboard tracking values to monitor progression milestones!");
    }
</script>
</body>
</html>
