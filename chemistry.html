<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chemistry Diagnostic | STUDY-WITH-MUBARAK</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <style>
        :root {
            --success-bg: #f0fdf4;
            --success-border: #22c55e;
            --success-text: #166534;
            --danger-bg: #fef2f2;
            --danger-border: #ef4444;
            --danger-text: #991b1b;
            --warning-bg: #fffbeb;
            --warning-border: #f59e0b;
            --warning-text: #92400e;
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-glow: rgba(16, 185, 129, 0.25);
            --dark: #0f172a;
            --gray: #64748b;
            --card-border: rgba(16, 185, 129, 0.15);
            --bg-main: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --option-border: #cbd5e1;
            --option-hover: #ecfdf5;
            --instruction-bg: #f8fafc;
            --instruction-text: #475569;
            --jump-btn-bg: #e2e8f0;
            --jump-btn-text: #0f172a;
            --card-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05);
        }

        [data-theme="dark"] {
            --bg-main: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --text-main: #f8fafc;
            --dark: #f8fafc;
            --gray: #94a3b8;
            --option-border: #334155;
            --option-hover: #064e3b;
            --instruction-bg: #0f172a;
            --instruction-text: #cbd5e1;
            --success-bg: rgba(6, 78, 59, 0.4);
            --success-text: #a7f3d0;
            --success-border: #059669;
            --danger-bg: rgba(127, 29, 29, 0.4);
            --danger-text: #fecaca;
            --danger-border: #dc2626;
            --warning-bg: rgba(120, 53, 15, 0.4);
            --warning-text: #fcd34a;
            --warning-border: #d97706;
            --jump-btn-bg: #1e293b;
            --jump-btn-text: #f8fafc;
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-glow: rgba(16, 185, 129, 0.4);
        }

        * { 
            box-sizing: border-box; 
            outline: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(var(--primary-glow) 1px, transparent 1px);
            background-size: 24px 24px;
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #a7f3d0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
        }

        .header-controls {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .main-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        .progress-wrapper {
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray);
        }
        .progress-bar {
            width: 100%;
            background: var(--option-border);
            height: 6px;
            border-radius: 999px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #34d399);
            width: 0%;
            transition: width 0.4s ease;
        }

        .grand-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .badge-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .timer-badge {
            background: linear-gradient(135deg, #065f46, var(--primary));
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .timer-badge.warning { background: linear-gradient(135deg, #d97706, #f59e0b); }
        .timer-badge.danger { background: linear-gradient(135deg, #b91c1c, #ef4444); }

        .toggle-jump-btn {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px dashed var(--primary);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
        }

        .instruction-tag {
            background: var(--instruction-bg);
            color: var(--instruction-text);
            font-size: 0.8rem;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            line-height: 1.4;
            font-weight: 600;
            flex-shrink: 0;
        }

        .question-area {
            position: relative;
            padding-right: 40px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .question-text {
            font-size: 1.05rem;
            color: var(--text-main);
            font-weight: 700;
            line-height: 1.4;
        }

        .audio-speech-btn {
            position: absolute;
            right: 0;
            top: 0;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: 12px;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--option-border);
            border-radius: 10px;
            background: var(--card-bg);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s ease;
            font-weight: 600;
            text-align: left;
            color: var(--text-main);
        }
        .option-btn:hover {
            border-color: var(--primary);
            background: var(--option-hover);
        }
        .option-btn.selected {
            border-color: var(--primary);
            background: var(--option-hover);
            color: var(--primary-dark);
            border-width: 2px;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            flex-shrink: 0;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--primary), #34d399);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex: 1;
        }

        .submit-btn-style {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }

        .flag-btn {
            background: var(--warning-bg);
            color: var(--warning-text);
            border: 1px solid var(--warning-border);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex: 1;
        }
        .flag-btn.flagged {
            background: var(--warning-border);
            color: white;
        }

        .nav-btn {
            background: var(--instruction-bg);
            color: var(--primary);
            border: 1px solid var(--option-border);
        }

        .action-btn:disabled, .nav-btn:disabled {
            background: var(--jump-btn-bg) !important;
            color: var(--gray) !important;
            border-color: transparent !important;
            cursor: not-allowed;
        }

        /* Fixed Overlay Navigation Grid for Mobile Sizing */
        .jump-grid-container {
            position: absolute;
            bottom: 60px;
            left: 12px;
            right: 12px;
            background: var(--instruction-bg);
            border-radius: 12px;
            border: 1px solid var(--option-border);
            padding: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 50;
        }
        .jump-grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .jump-grid-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
        }
        .jump-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .jump-item {
            padding: 8px 0;
            text-align: center;
            border-radius: 6px;
            background-color: var(--jump-btn-bg);
            color: var(--jump-btn-text);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }
        .jump-item.active {
            background: var(--primary);
            color: white;
        }
        .jump-item.answered {
            background: var(--success-bg);
            color: var(--success-text);
            border: 1px solid var(--success-border);
        }
        .jump-item.flagged::after {
            content: '🚩';
            font-size: 8px;
            position: absolute;
        }

        /* Results Panel Scroll Containment */
        .scrollable-result-view {
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }

        .score-display {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary), #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            margin: 10px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 12px 0;
        }
        .stat-card {
            background: var(--instruction-bg);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--option-border);
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--primary);
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--gray);
            text-transform: uppercase;
        }

        .review-card {
            margin-top: 12px;
            background: var(--instruction-bg);
            border: 1px solid var(--option-border);
            padding: 12px;
            border-radius: 10px;
            text-align: left;
        }
        .choice-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .explanation-box, .ai-explanation-box, .wiki-box {
            margin-top: 8px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            line-height: 1.4;
        }
        .explanation-box { background: var(--success-bg); border-left: 4px solid var(--success-border); color: var(--success-text); }
        .ai-explanation-box { background: rgba(168, 85, 247, 0.1); border-left: 4px solid #a855f7; color: #6b21a8; }
        [data-theme="dark"] .ai-explanation-box { background: rgba(168, 85, 247, 0.2); color: #f3e8ff; }
        .wiki-box { background: var(--bg-main); border-left: 4px solid #0284c7; }

        .hidden { display: none !important; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            max-width: 320px;
            width: 90%;
            text-align: center;
        }
        .modal h3 { margin-bottom: 8px; font-size: 1.1rem; }
        .modal p { font-size: 0.85rem; color: var(--gray); margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 8px; }

        .shortcuts-hint { font-size: 0.65rem; color: var(--gray); text-align: center; margin-top: 4px; }
    </style>
</head>
<body>

<header>
    <h1>STUDY-WITH-MUBARAK</h1>
    <div style="display: flex; align-items: center; gap: 8px;">
        <a href="index.html">🏠</a>
        <div class="header-controls">
            <button class="icon-btn" onclick="toggleDarkMode()">🌓</button>
            <button class="icon-btn" onclick="toggleTimer()">⏱️</button>
        </div>
    </div>
</header>

<div class="main-viewport">
    <div class="progress-wrapper">
        <div class="progress-info">
            <span id="progress-text">Loading...</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div id="quiz-box" class="grand-card">
        <div class="badge-controls">
            <button class="toggle-jump-btn" onclick="toggleJumpGrid()">🧩 Navigator</button>
            <div class="timer-badge" id="timer-badge">⏱️ 15:00</div>
        </div>

        <div id="instruction-box" class="instruction-tag"></div>
        
        <div class="question-area">
            <div class="question-text" id="q-text">Loading Chemistry Modules...</div>
            <button class="audio-speech-btn" onclick="speakQuestion()">🔊</button>
        </div>

        <div id="options-grid" class="options-container"></div>

        <div class="control-panel">
            <button id="prev-btn" class="action-btn nav-btn" onclick="navigateQuestion(-1)">←</button>
            <button id="flag-btn" class="flag-btn" onclick="toggleFlag()">🚩</button>
            <button id="submit-shortcut-btn" class="action-btn submit-btn-style" onclick="showSubmitModal()">Submit</button>
            <button id="next-btn" class="action-btn nav-btn" onclick="navigateQuestion(1)">→</button>
        </div>

        <div id="jump-grid-wrapper" class="jump-grid-container hidden">
            <div class="jump-grid-header">
                <span class="jump-grid-label">Quick Jump</span>
                <button class="toggle-jump-btn" onclick="toggleJumpGrid()">Close</button>
            </div>
            <div id="jump-box-grid" class="jump-grid"></div>
            <div class="shortcuts-hint">1-4 Select Options | Key Left/Right Navigate</div>
        </div>
    </div>

    <!-- Scrollable results to maintain screen constraints -->
    <div id="result-box" class="grand-card hidden" style="text-align: center;">
        <div class="scrollable-result-view">
            <h2>Session Completed 🎉</h2>
            <div class="score-display" id="final-score">0 / 0</div>

            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
                <div class="stat-card"><div class="stat-value" id="stat-wrong">0</div><div class="stat-label">Wrong</div></div>
                <div class="stat-card"><div class="stat-value" id="stat-unanswered">0</div><div class="stat-label">Empty</div></div>
                <div class="stat-card"><div class="stat-value" id="stat-time">0:00</div><div class="stat-label">Duration</div></div>
            </div>

            <p id="performance-msg" style="color: var(--gray); font-size: 0.85rem; font-weight: 600; margin-bottom: 12px;"></p>
            
            <div style="display: flex; gap: 8px; justify-content: center;">
                <button class="action-btn" onclick="resetSessionData()">🔄 Restart</button>
                <button class="action-btn nav-btn" onclick="exportResults()">📥 Export</button>
            </div>

            <div id="review-cards-container"></div>
        </div>
    </div>
</div>

<div class="modal-overlay hidden" id="submit-modal">
    <div class="modal">
        <h3>Submit Assessment?</h3>
        <p>Are you sure you want to grade your current performance track?</p>
        <div class="modal-actions">
            <button class="action-btn nav-btn" onclick="closeSubmitModal()">Cancel</button>
            <button class="action-btn submit-btn-style" onclick="confirmSubmit()">Submit</button>
        </div>
    </div>
</div>

<script>
    const masterQuestions = [
        { instr: "Stoichiometry: Quantifying matter transformations.", q: "How many moles of water are produced when 2 moles of hydrogen gas react completely with excess oxygen gas?", options: ["1 mole", "2 moles", "4 moles", "0.5 moles"], correct: 1, exp: "According to the balanced equation 2H₂ + O₂ → 2H₂O, the molar ratio between H₂ and H₂O is 2:2 (or 1:1). Therefore, 2 moles of H₂ will produce exactly 2 moles of H₂O." },
        { instr: "Atomic Structure & Periodic Trends: Group attributes.", q: "Which of the following elements possesses the highest first ionization energy?", options: ["Sodium (Na)", "Chlorine (Cl)", "Fluorine (F)", "Cesium (Cs)"], correct: 2, exp: "Ionization energy increases across a period and decreases down a group. Fluorine is located at the top right of the active main groups, giving it a small atomic radius and a highly effective nuclear charge." },
        { instr: "Chemical Bonding & Molecular Structure: Interactions.", q: "What is the primary molecular geometry associated with a methane (CH₄) molecule?", options: ["Linear", "Trigonal Planar", "Tetrahedral", "Bent"], correct: 2, exp: "Methane has four bonding pairs and zero lone pairs around its central carbon atom. According to VSEPR theory, these four pairs minimize repulsion by adopting a tetrahedral orientation." },
        { instr: "Gas Laws: Macro-system property alterations.", q: "If the absolute temperature of an ideal gas sample is doubled while its volume is held completely constant, the pressure will:", options: ["Be cut in half", "Remain unchanged", "Double", "Quadruple"], correct: 2, exp: "Gay-Lussac's Law states that pressure is directly proportional to absolute temperature when volume is constant ($P_1/T_1 = P_2/T_2$). Doubling the temperature will double the pressure." },
        { instr: "Chemical Kinetics: Reaction profile transformations.", q: "How does the addition of a catalyst alter the rate of a chemical reaction?", options: ["By increasing the heat of reaction (ΔH)", "By lowering the required activation energy (Ea)", "By increasing the kinetic energy of the reactants", "By shifting the equilibrium toward the products"], correct: 1, exp: "A catalyst speeds up a chemical reaction by providing an alternative pathway with a lower activation energy ($E_a$), allowing more reactant particles to possess sufficient energy to collide successfully." }
    ];

    let questions = [];
    let currentQ = 0;
    let userAnswers = [];
    let flaggedQuestions = new Set();
    let timerInterval = null;
    let timeRemaining = 900; 
    let timerPaused = false;
    let totalDuration = 900;
    let aiExplanationCache = {};

    const POLLINATION_API_URL = 'https://text.pollinations.ai/';

    function toggleJumpGrid() {
        document.getElementById("jump-grid-wrapper").classList.toggle("hidden");
    }

    function setupSession() {
        const locallyStoredState = localStorage.getItem("mubarak_bio_portal_state");
        if (locallyStoredState) {
            try {
                const parsedState = JSON.parse(locallyStoredState);
                questions = parsedState.questions;
                currentQ = parsedState.currentQ;
                userAnswers = parsedState.userAnswers;
                flaggedQuestions = new Set(parsedState.flaggedQuestions);
                timeRemaining = parsedState.timeRemaining;
                
                if (parsedState.isSubmitted) {
                    executeUIRenderOnSubmit(parsedState.statistics);
                    return;
                }
                startTimer();
                initQuiz();
                return;
            } catch (err) { console.error(err); }
        }
        createNewFreshSession();
    }

    function createNewFreshSession() {
        questions = [...masterQuestions];
        userAnswers = new Array(questions.length).fill(null);
        flaggedQuestions.clear();
        currentQ = 0;
        timeRemaining = 900;
        saveCurrentProgressToStorage(false);
        startTimer();
        initQuiz();
    }

    function saveCurrentProgressToStorage(isSubmitted = false, compiledStats = null) {
        const statePayload = {
            questions: questions, currentQ: currentQ, userAnswers: userAnswers,
            flaggedQuestions: Array.from(flaggedQuestions), timeRemaining: timeRemaining,
            isSubmitted: isSubmitted, statistics: compiledStats
        };
        localStorage.setItem("mubarak_bio_portal_state", JSON.stringify(statePayload));
    }

    function resetSessionData() {
        localStorage.removeItem("mubarak_bio_portal_state");
        location.reload();
    }

    function toggleDarkMode() {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        if (currentTheme === "dark") {
            document.documentElement.removeAttribute("data-theme");
            localStorage.setItem("bio_theme", "light");
        } else {
            document.documentElement.setAttribute("data-theme", "dark");
            localStorage.setItem("bio_theme", "dark");
        }
    }

    if (localStorage.getItem("bio_theme") === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!timerPaused) {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    confirmSubmit();
                }
            }
        }, 1000);
    }

    function toggleTimer() {
        timerPaused = !timerPaused;
        document.getElementById("timer-badge").style.opacity = timerPaused ? "0.3" : "1";
    }

    function updateTimerDisplay() {
        const badge = document.getElementById("timer-badge");
        if (!badge) return;
        const mins = Math.floor(timeRemaining / 60);
        const secs = timeRemaining % 60;
        badge.textContent = `⏱️ ${mins}:${secs < 10 ? '0' : ''}${secs}`;
        badge.className = timeRemaining < 180 ? "timer-badge danger" : timeRemaining < 450 ? "timer-badge warning" : "timer-badge";
    }

    function speakQuestion() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const qObj = questions[currentQ];
            const utterance = new SpeechSynthesisUtterance(`${qObj.instr}. ${qObj.q}`);
            window.speechSynthesis.speak(utterance);
        }
    }

    function initQuiz() {
        if (questions.length === 0) return;
        renderActiveQuestion();
        renderNavigatorGrid();
        updateProgressIndicators();
    }

    function renderActiveQuestion() {
        const item = questions[currentQ];
        document.getElementById("instruction-box").textContent = item.instr;
        document.getElementById("q-text").textContent = `${currentQ + 1}. ${item.q}`;
        
        const grid = document.getElementById("options-grid");
        grid.innerHTML = "";
        
        item.options.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.className = `option-btn ${userAnswers[currentQ] === idx ? 'selected' : ''}`;
            btn.textContent = opt;
            btn.onclick = () => selectOptionIndex(idx);
            grid.appendChild(btn);
        });

        document.getElementById("prev-btn").disabled = currentQ === 0;
        document.getElementById("next-btn").disabled = currentQ === questions.length - 1;
        
        const flagBtn = document.getElementById("flag-btn");
        flagBtn.className = flaggedQuestions.has(currentQ) ? "flag-btn flagged" : "flag-btn";
    }

    function selectOptionIndex(idx) {
        userAnswers[currentQ] = idx;
        renderActiveQuestion();
        renderNavigatorGrid();
        saveCurrentProgressToStorage(false);
    }

    function navigateQuestion(step) {
        currentQ += step;
        renderActiveQuestion();
        renderNavigatorGrid();
        updateProgressIndicators();
    }

    function updateProgressIndicators() {
        const total = questions.length;
        const percent = Math.round((currentQ + 1) / total * 100);
        document.getElementById("progress-text").textContent = `Item ${currentQ + 1} / ${total}`;
        document.getElementById("progress-percent").textContent = `${percent}%`;
        document.getElementById("progress-fill").style.width = `${percent}%`;
    }

    function renderNavigatorGrid() {
        const gridContainer = document.getElementById("jump-box-grid");
        gridContainer.innerHTML = "";
        
        questions.forEach((_, index) => {
            const item = document.createElement("div");
            item.className = `jump-item`;
            if (index === currentQ) item.classList.add("active");
            if (userAnswers[index] !== null) item.classList.add("answered");
            if (flaggedQuestions.has(index)) item.classList.add("flagged");
            
            item.textContent = index + 1;
            item.onclick = () => {
                currentQ = index;
                renderActiveQuestion();
                renderNavigatorGrid();
                updateProgressIndicators();
                toggleJumpGrid();
            };
            gridContainer.appendChild(item);
        });
    }

    function toggleFlag() {
        if (flaggedQuestions.has(currentQ)) flaggedQuestions.delete(currentQ);
        else flaggedQuestions.add(currentQ);
        renderActiveQuestion();
        renderNavigatorGrid();
    }

    function showSubmitModal() { document.getElementById("submit-modal").classList.remove("hidden"); }
    function closeSubmitModal() { document.getElementById("submit-modal").classList.add("hidden"); }

    function confirmSubmit() {
        closeSubmitModal();
        calculateResults();
    }

    function calculateResults() {
        let correct = 0, wrong = 0, unanswered = 0;
        questions.forEach((q, idx) => {
            if (userAnswers[idx] === null) unanswered++;
            else if (userAnswers[idx] === q.correct) correct++;
            else wrong++;
        });

        const timeTaken = totalDuration - timeRemaining;
        const statistics = {
            correct: correct, wrong: wrong, unanswered: unanswered,
            timeTaken: `${Math.floor(timeTaken / 60)}:${timeTaken % 60 < 10 ? '0' : ''}${timeTaken % 60}`,
            score: correct
        };

        saveCurrentProgressToStorage(true, statistics);
        executeUIRenderOnSubmit(statistics);
    }

    function executeUIRenderOnSubmit(stats) {
        clearInterval(timerInterval);
        document.getElementById("quiz-box").classList.add("hidden");
        document.getElementById("result-box").classList.remove("hidden");

        document.getElementById("final-score").textContent = `${stats.correct} / ${questions.length}`;
        document.getElementById("stat-correct").textContent = stats.correct;
        document.getElementById("stat-wrong").textContent = stats.wrong;
        document.getElementById("stat-unanswered").textContent = stats.unanswered;
        document.getElementById("stat-time").textContent = stats.timeTaken;

        renderReviewCards();
    }

    function renderReviewCards() {
        const container = document.getElementById("review-cards-container");
        container.innerHTML = "";

        questions.forEach((q, idx) => {
            const userAnswer = userAnswers[idx];
            const isCorrect = userAnswer === q.correct;
            const isUnanswered = userAnswer === null;

            const card = document.createElement("div");
            card.className = "review-card";

            const statusClass = isUnanswered ? "badge-unanswered" : isCorrect ? "badge-correct" : "badge-wrong";
            const statusText = isUnanswered ? "Unanswered" : isCorrect ? "Correct" : "Incorrect";

            card.innerHTML = `
                <div><span class="choice-badge ${statusClass}">${statusText}</span></div>
                <div style="font-size:0.85rem; font-weight:700; margin-bottom:6px;">Q${idx+1}: ${q.q}</div>
                <div style="font-size:0.8rem; color:var(--gray); margin-bottom:4px;">Correct Option: <strong>${q.options[q.correct]}</strong></div>
                <div class="explanation-box">${q.exp}</div>
                <button class="action-btn nav-btn" style="margin-top:6px; padding:4px;" onclick="fetchAIExplanation(${idx}, event)">✨ Ask Mubarak AI</button>
                <div id="ai-explanation-${idx}" class="hidden"></div>
            `;
            container.appendChild(card);
        });
    }

    async function fetchAIExplanation(questionIdx, event) {
        const q = questions[questionIdx];
        const container = document.getElementById(`ai-explanation-${questionIdx}`);
        container.classList.remove('hidden');
        container.innerHTML = '<div class="ai-explanation-box">Consulting AI Chemist Hub...</div>';

        try {
            const response = await fetch(POLLINATION_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: 'system', content: "You are an expert Chemistry professor. Keep your answers brief, structured, and clear for high school and college students." },
                        { role: 'user', content: `Explain the correct chemistry answer for this question: ${q.q}. Options: ${q.options.join(', ')}. Correct index is ${q.correct}.` }
                    ],
                    model: 'openai'
                })
            });
            const text = await response.text();
            container.innerHTML = `<div class="ai-explanation-box"><strong>Mubarak AI:</strong><br>${text.replace(/\n/g, '<br>')}</div>`;
        } catch (e) {
            container.innerHTML = '<div class="ai-explanation-box">Connection timeout. Please double check your local connection parameters.</div>';
        }
    }

    function exportResults() {
        let csv = "Question,Your Choice,Correct Choice\n";
        questions.forEach((q, idx) => {
            const userChoice = userAnswers[idx] !== null ? q.options[userAnswers[idx]] : "None";
            csv += `"${q.q}","${userChoice}","${q.options[q.correct]}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'chemistry-results.csv';
        link.click();
    }

    document.addEventListener('keydown', (e) => {
        if (document.getElementById("quiz-box").classList.contains("hidden")) return;
        if (e.key === "ArrowLeft") navigateQuestion(-1);
        if (e.key === "ArrowRight") navigateQuestion(1);
        if (e.key >= "1" && e.key <= "4") selectOptionIndex(parseInt(e.key) - 1);
    });

    setupSession();
</script>
</body>
</html>
