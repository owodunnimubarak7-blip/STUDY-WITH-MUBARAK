<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Suite | Study With Mubarak</title>
    <style>
        :root {
            --bg: #0b0914;
            --surface: rgba(19, 17, 34, 0.7);
            --border: rgba(139, 92, 246, 0.2);
            --text-main: #f5f3ff;
            --text-muted: #ddd6fe;
            --primary: #8b5cf6;
            --blur: blur(16px);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        body { margin: 0; padding: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; }
        .navbar { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); backdrop-filter: var(--blur); position: sticky; top: 0; z-index: 100; }
        .back-btn { color: var(--primary); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .container { max-width: 850px; margin: 30px auto; padding: 0 24px; }
        .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 36px; box-shadow: var(--shadow); backdrop-filter: var(--blur); margin-bottom: 24px; }
        input { background: #07050d; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 0.95rem; margin: 6px; width: calc(50% - 20px); box-sizing: border-box; }
        button { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 12px; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="back-btn">➔ Back to Hub</a>
    <div style="font-weight: 800; text-transform: uppercase;">⚗️ Advanced Chemistry Station</div>
</div>

<div class="container">
    <div class="quiz-card">
        <h2 style="margin-top:0; color: var(--primary);">Ideal Gas Law $PV = nRT$ Core Engine</h2>
        <p style="color: var(--text-muted);">Leave the **single** metric box you need to compute completely blank/empty, populate the others, and hit execute.</p>
        <input type="number" id="gasP" placeholder="Pressure (P) atm">
        <input type="number" id="gasV" placeholder="Volume (V) Liters">
        <input type="number" id="gasN" placeholder="Amount (n) Moles">
        <input type="number" id="gasT" placeholder="Temperature (T) Kelvin"><br>
        <button onclick="calculateGasLaw()">Solve Target Formula Matrix</button>
        <h3 id="gasResult" style="color: #c084fc; margin-top:20px; text-align:center;"></h3>
    </div>

    <div class="quiz-card">
        <h2 style="margin-top:0;">Syllabus Question Array Preview</h2>
        <div id="questionsContainer"></div>
    </div>
</div>

<script>
    const chemRepo = [
        { topic: "Coordination Chemistry", q: "What is the accurate oxidation state allocation of Iron within the standard potassium hexacyanoferrate(II) complex coordination framework compound?", o: ["+2", "+3", "+4", "-2"] }
    ];

    document.getElementById('questionsContainer').innerHTML = chemRepo.map((q, idx) => `
        <div style="margin-bottom: 24px; border-left: 4px solid var(--primary); padding-left: 16px;">
            <div style="font-size:0.85rem; font-weight:800; color:var(--primary); text-transform:uppercase;">${q.topic}</div>
            <div style="font-size:1.1rem; margin: 8px 0; font-weight:700;">Q${idx+1}: ${q.q}</div>
            <div style="display:grid; gap:8px; color: var(--text-muted);">
                ${q.o.map(opt => `<div style="background:#141126; padding:10px; border-radius:6px;">○ ${opt}</div>`).join('')}
            </div>
        </div>
    `).join('');

    function calculateGasLaw() {
        let P = parseFloat(document.getElementById('gasP').value);
        let V = parseFloat(document.getElementById('gasV').value);
        let n = parseFloat(document.getElementById('gasN').value);
        let T = parseFloat(document.getElementById('gasT').value);
        const R = 0.0821;

        let target = document.getElementById('gasResult');
        if (isNaN(P)) target.innerText = `Computed Pressure (P) = ${((n * R * T) / V).toFixed(4)} atm`;
        else if (isNaN(V)) target.innerText = `Computed Volume (V) = ${((n * R * T) / P).toFixed(4)} L`;
        else if (isNaN(n)) target.innerText = `Computed Moles (n) = ${((P * V) / (R * T)).toFixed(4)} mol`;
        else if (isNaN(T)) target.innerText = `Computed Temperature (T) = ${((P * V) / (n * R)).toFixed(4)} K`;
        else target.innerText = "Please clear out the single target parameter field you want resolved.";
    }
</script>
</body>
</html>
