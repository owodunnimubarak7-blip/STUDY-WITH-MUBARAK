<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economics Suite | Study With Mubarak</title>
    <style>
        :root {
            --bg: #141109;
            --surface: rgba(34, 29, 17, 0.7);
            --border: rgba(245, 158, 11, 0.2);
            --text-main: #fef3c7;
            --text-muted: #fde68a;
            --primary: #f59e0b;
            --blur: blur(16px);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        body { margin: 0; padding: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; }
        .navbar { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); backdrop-filter: var(--blur); position: sticky; top: 0; z-index: 100; }
        .back-btn { color: var(--primary); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .container { max-width: 850px; margin: 30px auto; padding: 0 24px; }
        .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 36px; box-shadow: var(--shadow); backdrop-filter: var(--blur); margin-bottom: 24px; }
        input { background: #0e0c06; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 0.95rem; margin: 6px; width: calc(50% - 20px); box-sizing: border-box; }
        button { background: var(--primary); color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 12px; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="back-btn">➔ Back to Hub</a>
    <div style="font-weight: 800; text-transform: uppercase;">📈 Advanced Economics Station</div>
</div>

<div class="container">
    <div class="quiz-card">
        <h2 style="margin-top:0; color: var(--primary);">Price Elasticity of Demand Analyzer</h2>
        <p style="color: var(--text-muted);">Provide shift analytics tracking parameters to resolve elasticity indexing bounds.</p>
        <input type="number" id="q1" placeholder="Initial Quantity (Q1)">
        <input type="number" id="q2" placeholder="New Quantity (Q2)">
        <input type="number" id="p1" placeholder="Initial Price (P1)">
        <input type="number" id="p2" placeholder="New Price (P2)">
        <button onclick="calculateEconElasticity()">Extract Elasticity Index Coefficient</button>
        <h3 id="econResult" style="color: #fbbf24; margin-top:20px; text-align:center;"></h3>
    </div>

    <div class="quiz-card">
        <h2 style="margin-top:0;">Syllabus Question Array Preview</h2>
        <div id="questionsContainer"></div>
    </div>
</div>

<script>
    const econRepo = [
        { topic: "Theory of Elasticity", q: "When an absolute expansion vector alteration in price adjustments yields zero change to global supply metrics, elastic index values evaluate as:", o: ["Perfectly Inelastic", "Perfectly Elastic", "Unitary Elasticity", "Infinitely Variable"] }
    ];

    document.getElementById('questionsContainer').innerHTML = econRepo.map((q, idx) => `
        <div style="margin-bottom: 24px; border-left: 4px solid var(--primary); padding-left: 16px;">
            <div style="font-size:0.85rem; font-weight:800; color:var(--primary); text-transform:uppercase;">${q.topic}</div>
            <div style="font-size:1.1rem; margin: 8px 0; font-weight:700;">Q${idx+1}: ${q.q}</div>
            <div style="display:grid; gap:8px; color: var(--text-muted);">
                ${q.o.map(opt => `<div style="background:#1f1a0e; padding:10px; border-radius:6px;">○ ${opt}</div>`).join('')}
            </div>
        </div>
    `).join('');

    function calculateEconElasticity() {
        let q1 = parseFloat(document.getElementById('q1').value);
        let q2 = parseFloat(document.getElementById('q2').value);
        let p1 = parseFloat(document.getElementById('p1').value);
        let p2 = parseFloat(document.getElementById('p2').value);

        let dQ = (q2 - q1) / q1;
        let dP = (p2 - p1) / p1;
        if(dP === 0) return alert("Price Delta calculation collision. Division by zero impossible.");

        let ped = Math.abs(dQ / dP);
        let type = "Unitary Elasticity Dynamics";
        if(ped > 1) type = "Highly Elastic Elasticity Value";
        if(ped < 1) type = "Inelastic Elasticity Value";

        document.getElementById('econResult').innerText = `Coefficient (E_d) = ${ped.toFixed(3)} (${type})`;
    }
</script>
</body>
</html>
